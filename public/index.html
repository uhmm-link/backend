<body>
  <div id="app"></div>
  <script>
    const API = window.location.origin + '/api';
    const AUTH_KEY = 'uhmm_logged_in';
    let _cachedShareBaseUrl = null;
    function getShareBaseUrlSync() {
      return _cachedShareBaseUrl || window.location.origin;
    }
    async function fetchShareBaseUrl(onUpdate) {
      const creatorId = getCreatorId() || '';
      try {
        const r = await fetch(API + '/settings/base-url?creatorId=' + encodeURIComponent(creatorId));
        const d = await r.json();
        if (d?.baseUrl) {
          const url = d.baseUrl.replace(/\/$/, '');
          if (url !== _cachedShareBaseUrl) {
            _cachedShareBaseUrl = url;
            onUpdate?.();
          }
        }
      } catch (_) {}
    }
    function invalidateShareBaseUrlCache() { _cachedShareBaseUrl = null; }
    const USER_ID_KEY = 'uhmm_user_id';
    let authUser = null;

    const TEST_USERS = { user1: 'u1', user2: 'u2', user3: 'u3' };
    const USER_DISPLAY_NAMES = { u1: 'User 1', u2: 'User 2', u3: 'User 3' };
    function getUserDisplayName(id) {
      if (authUser && authUser.id === id) return authUser.name || authUser.email || id;
      return USER_DISPLAY_NAMES[id] || id;
    }
    function getReviewerDisplayName() {
      const id = getCreatorId();
      return id ? getUserDisplayName(id) : null;
    }

    function isLoggedIn() {
      if (authUser?.id) return true;
      return localStorage.getItem(AUTH_KEY) === '1';
    }
    function setLoggedIn(value) {
      localStorage.setItem(AUTH_KEY, value ? '1' : '0');
      if (value && !localStorage.getItem(USER_ID_KEY)) {
        localStorage.setItem(USER_ID_KEY, TEST_USERS.user1);
      }
    }
    function loginAsUser(userKey) {
      localStorage.setItem(AUTH_KEY, '1');
      localStorage.setItem(USER_ID_KEY, TEST_USERS[userKey]);
    }
    function getCreatorId() {
      if (authUser?.id) return authUser.id;
      if (!isLoggedIn()) return null;
      let id = localStorage.getItem(USER_ID_KEY);
      if (!id) {
        id = 'u' + Math.random().toString(36).slice(2, 11);
        localStorage.setItem(USER_ID_KEY, id);
      }
      return id;
    }
    async function refreshAuthUser() {
      try {
        const res = await fetch(API + '/auth/me', { credentials: 'include' });
        if (!res.ok) throw new Error('auth unavailable');
        const data = await res.json();
        if (data?.authenticated && data?.user?.id) {
          authUser = data.user;
          localStorage.setItem(AUTH_KEY, '1');
          localStorage.setItem(USER_ID_KEY, data.user.id);
          return;
        }
      } catch (_) {}
      authUser = null;
    }
    function startGoogleLogin() {
      const returnTo = window.location.pathname + (window.location.hash || '');
      window.location.href = API + '/auth/google/start?returnTo=' + encodeURIComponent(returnTo);
    }
    function showSignInModal(onClose) {
      const overlay = el('div', { className: 'settings-modal-overlay' });
      const modal = el('div', { className: 'settings-modal auth-signin-modal' });
      modal.appendChild(el('h3', null, 'Log in / Sign up'));
      let mode = 'login';
      const toggle = el('div', { className: 'auth-mode-toggle' });
      const loginTab = el('button', { className: 'auth-mode-tab active', type: 'button' }, 'Log in');
      const sep = el('span', { className: 'auth-mode-sep' }, 'or');
      const signupTab = el('button', { className: 'auth-mode-tab', type: 'button' }, 'Sign up');
      toggle.appendChild(loginTab);
      toggle.appendChild(sep);
      toggle.appendChild(signupTab);
      modal.appendChild(toggle);

      const providers = el('div', { className: 'auth-provider-list' });
      modal.appendChild(providers);

      function renderProviderButtons() {
        const prefix = mode === 'login' ? 'Log in' : 'Sign up';
        providers.innerHTML = '';
        const googleBtn = el('button', { className: 'auth-provider-btn', type: 'button' }, prefix + ' with Google');
        googleBtn.onclick = () => { startGoogleLogin(); };
        const appleBtn = el('button', { className: 'auth-provider-btn', type: 'button', disabled: true }, prefix + ' with Apple (coming soon)');
        const emailBtn = el('button', { className: 'auth-provider-btn', type: 'button' }, prefix + ' with Email');
        emailBtn.onclick = () => showEmailForm();
        providers.appendChild(googleBtn);
        providers.appendChild(appleBtn);
        providers.appendChild(emailBtn);
      }
      async function showEmailForm() {
        providers.innerHTML = '';
        const form = el('div', { className: 'auth-email-form' });
        const emailInput = el('input', { type: 'email', placeholder: 'Email', className: 'auth-input' });
        const passwordInput = el('input', { type: 'password', placeholder: 'Password', className: 'auth-input' });
        const nameInput = el('input', { type: 'text', placeholder: 'Name (optional)', className: 'auth-input' });
        const userTypeSelect = el('select', { className: 'auth-input' });
        userTypeSelect.appendChild(el('option', { value: '' }, 'Human'));
        userTypeSelect.appendChild(el('option', { value: 'agent' }, 'Agent'));
        const submitBtn = el('button', { className: 'auth-provider-btn', type: 'button' }, mode === 'login' ? 'Log in' : 'Sign up');
        const backBtn = el('button', { className: 'auth-provider-btn', type: 'button', style: 'margin-left:8px' }, 'Back');
        form.appendChild(el('label', null, 'Email'));
        form.appendChild(emailInput);
        form.appendChild(el('label', null, 'Password'));
        form.appendChild(passwordInput);
        if (mode === 'signup') {
          form.appendChild(el('label', null, 'Name (optional)'));
          form.appendChild(nameInput);
          form.appendChild(el('label', null, 'I am a'));
          form.appendChild(userTypeSelect);
        }
        form.appendChild(el('div', { className: 'auth-email-actions' }, submitBtn, backBtn));
        submitBtn.onclick = async () => {
          const email = emailInput.value.trim();
          const password = passwordInput.value;
          if (!email || !password) { alert('Email and password required'); return; }
          if (mode === 'signup' && password.length < 8) { alert('Password must be at least 8 characters'); return; }
          submitBtn.disabled = true;
          try {
            const res = await fetch(API + (mode === 'login' ? '/auth/login' : '/auth/register'), {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'include',
              body: JSON.stringify({
                email,
                password,
                name: mode === 'signup' ? nameInput.value.trim() || undefined : undefined,
                userType: mode === 'signup' && userTypeSelect.value ? userTypeSelect.value : undefined
              })
            });
            const data = await res.json().catch(() => ({}));
            if (res.ok) {
              authUser = data.user ? { id: data.user.id, name: data.user.name || data.user.email, email: data.user.email } : null;
              setLoggedIn(true);
              if (data.user?.id) localStorage.setItem(USER_ID_KEY, data.user.id);
              overlay.remove();
              onClose && onClose();
            } else {
              alert(data.error || 'Failed');
            }
          } catch (e) {
            alert('Request failed');
          } finally {
            submitBtn.disabled = false;
          }
        };
        backBtn.onclick = () => renderProviderButtons();
        providers.appendChild(form);
        emailInput.focus();
      }
      function setMode(nextMode) {
        mode = nextMode;
        loginTab.classList.toggle('active', mode === 'login');
        signupTab.classList.toggle('active', mode === 'signup');
        renderProviderButtons();
      }
      loginTab.onclick = () => setMode('login');
      signupTab.onclick = () => setMode('signup');
      renderProviderButtons();

      const devLinks = el('div', { className: 'auth-dev-links' });
      ['user1', 'user2', 'user3'].forEach((key, idx) => {
        const devBtn = el('button', { className: 'auth-dev-btn', type: 'button' }, 'Dev User ' + (idx + 1));
        devBtn.onclick = () => {
          loginAsUser(key);
          overlay.remove();
          onClose && onClose();
        };
        devLinks.appendChild(devBtn);
      });
      modal.appendChild(devLinks);
      const actions = el('div', { className: 'settings-modal-actions' });
      const closeBtn = el('button', { className: 'btn-action' }, 'Close');
      closeBtn.onclick = () => { overlay.remove(); onClose && onClose(); };
      actions.appendChild(closeBtn);
      modal.appendChild(actions);
      overlay.onclick = (e) => { if (e.target === overlay) { overlay.remove(); onClose && onClose(); } };
      modal.onclick = (e) => e.stopPropagation();
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
    }
    async function logoutAccount() {
      try {
        await fetch(API + '/auth/logout', { method: 'POST', credentials: 'include' });
      } catch (_) {}
      authUser = null;
      setLoggedIn(false);
    }

    function el(tag, attrs, ...children) {
      const e = document.createElement(tag);
      if (attrs) Object.assign(e, attrs);
      children.flat().forEach(c => {
        if (typeof c === 'string') e.appendChild(document.createTextNode(c));
        else if (c) e.appendChild(c);
      });
      return e;
    }

    function makeQRCodeButton(reviewUrl) {
      const btn = el('span', { className: 'qr-icon', title: 'Show QR code' });

      const qrSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      qrSvg.setAttribute('viewBox', '0 0 24 24');
      qrSvg.setAttribute('width', '16');
      qrSvg.setAttribute('height', '16');
      qrSvg.setAttribute('fill', 'none');
      qrSvg.setAttribute('stroke', 'currentColor');
      qrSvg.setAttribute('stroke-width', '2');
      qrSvg.innerHTML = '<rect x="3" y="3" width="5" height="5" fill="currentColor"/><rect x="16" y="3" width="5" height="5" fill="currentColor"/><rect x="3" y="16" width="5" height="5" fill="currentColor"/><rect x="16" y="16" width="5" height="5" fill="currentColor"/>';
      btn.appendChild(qrSvg);

      btn.onclick = (e) => {
        if (e) e.stopPropagation();
        const overlay = el('div', { className: 'qr-modal-overlay' });
        overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
        const qrImg = el('img', {
          src: 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(reviewUrl),
          alt: 'QR code for review link',
          width: 200,
          height: 200
        });
        const modal = el('div', { className: 'qr-modal' });
        modal.appendChild(qrImg);
        modal.appendChild(el('p', null, 'Scan to open review on your phone'));
        modal.onclick = (e) => e.stopPropagation();
        overlay.appendChild(modal);
        document.body.appendChild(overlay);
      };
      return btn;
    }

    async function fetchJSON(url, opts) {
      const r = await fetch(url, opts);
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }

    function showExportBlob(text, filename, mime) {
      const b64 = btoa(unescape(encodeURIComponent(text)));
      const html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Export</title><style>body{font-family:system-ui,sans-serif;margin:1rem;white-space:pre-wrap;word-break:break-all;}button{margin-bottom:1rem;padding:0.5rem 1rem;cursor:pointer;}</style></head><body><button onclick="d()">Download</button><pre id="c"></pre><script>(function(){var t=decodeURIComponent(escape(atob("' + b64 + '")));document.getElementById("c").textContent=t;window.d=function(){var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([t],{type:"' + mime + '"}));a.download="' + filename + '";a.click();};})();<' + '/script></body></html>';
      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const w = window.open(url, '_blank');
      if (!w || w.closed) window.location.href = url;
      setTimeout(() => URL.revokeObjectURL(url), 10000);
    }

    function makeShareDropdown(opts) {
      const { scoresUrl, scores, cardsByApproval, label } = opts;
      const isAggregated = !!cardsByApproval;
      const data = isAggregated ? cardsByApproval : (scores || []);
      if (!data.length) return null;
      const dt = new Date().toISOString().slice(0, 19).replace('T', '_').replace(/:/g, '-');
      const safeLabel = (label || 'scores').replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 30);
      const wrap = el('div', { className: 'share-dropdown-wrap' });
      const shareIcon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      shareIcon.setAttribute('viewBox', '0 0 24 24');
      shareIcon.setAttribute('width', '14');
      shareIcon.setAttribute('height', '14');
      shareIcon.setAttribute('fill', 'none');
      shareIcon.setAttribute('stroke', 'currentColor');
      shareIcon.setAttribute('stroke-width', '2');
      shareIcon.setAttribute('stroke-linecap', 'round');
      shareIcon.setAttribute('stroke-linejoin', 'round');
      shareIcon.innerHTML = '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>';
      const btn = el('button', { className: 'share-btn' }, shareIcon, 'Share');
      const dropdown = el('div', { className: 'share-dropdown hidden' });
      const close = () => { dropdown.classList.add('hidden'); document.removeEventListener('click', close); };
      if (scoresUrl) {
        const openItem = el('button', { className: 'share-dropdown-item' }, 'Open in new tab');
        openItem.onclick = (e) => { e.stopPropagation(); window.open(scoresUrl, '_blank'); close(); };
        dropdown.appendChild(openItem);
        const copyItem = el('button', { className: 'share-dropdown-item' }, 'Copy URL');
        copyItem.onclick = (e) => { e.stopPropagation(); navigator.clipboard.writeText(scoresUrl); copyItem.textContent = 'Copied!'; setTimeout(() => { copyItem.textContent = 'Copy URL'; close(); }, 600); };
        dropdown.appendChild(copyItem);
      }
      const jsonItem = el('button', { className: 'share-dropdown-item' }, 'Open as JSON');
      const csvItem = el('button', { className: 'share-dropdown-item' }, 'Open as CSV');
      if (isAggregated) {
        const jsonData = cardsByApproval.map((c) => ({ cardId: c.cardId, content: c.content || '', approved: c.approved || 0, rejected: c.rejected || 0, stackLabel: c.stackLabel || '' }));
        jsonItem.onclick = (e) => { e.stopPropagation(); showExportBlob(JSON.stringify(jsonData, null, 2), safeLabel + '_' + dt + '.json', 'application/json'); close(); };
        csvItem.onclick = (e) => { e.stopPropagation(); const text = 'cardId,content,approved,rejected,stackLabel\n' + jsonData.map((r) => '"' + (r.cardId || '').replace(/"/g, '""') + '","' + (r.content || '').replace(/"/g, '""') + '",' + r.approved + ',' + r.rejected + ',"' + (r.stackLabel || '').replace(/"/g, '""') + '"').join('\n'); showExportBlob(text, safeLabel + '_' + dt + '.csv', 'text/csv'); close(); };
      } else {
        jsonItem.onclick = (e) => { e.stopPropagation(); const text = JSON.stringify(scores.map((s) => ({ id: s.cardId, content: s.content || '', decision: s.decision, decidedAt: s.decidedAt })), null, 2); showExportBlob(text, safeLabel + '_' + dt + '.json', 'application/json'); close(); };
        csvItem.onclick = (e) => { e.stopPropagation(); const text = 'cardId,content,decision,decidedAt\n' + scores.map((s) => '"' + (s.cardId || '').replace(/"/g, '""') + '","' + (s.content || '').replace(/"/g, '""') + '","' + (s.decision || '') + '","' + (s.decidedAt || '') + '"').join('\n'); showExportBlob(text, safeLabel + '_' + dt + '.csv', 'text/csv'); close(); };
      }
      dropdown.appendChild(jsonItem);
      dropdown.appendChild(csvItem);
      btn.onclick = (e) => { e.stopPropagation(); const wasHidden = dropdown.classList.toggle('hidden'); if (wasHidden) setTimeout(() => document.addEventListener('click', close), 0); };
      dropdown.onclick = (e) => e.stopPropagation();
      wrap.appendChild(btn);
      wrap.appendChild(dropdown);
      return wrap;
    }

    function makeExportScoresButtons(scores, label, scoresUrl) {
      return makeShareDropdown({ scores, label, scoresUrl });
    }

    function makeExportAggregatedButtons(cardsByApproval, label, scoresUrl) {
      return makeShareDropdown({ cardsByApproval, label, scoresUrl });
    }

    const IMAGE_TYPES = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
    const IMAGE_EXT = /\.(jpg|jpeg|png|gif|webp)$/i;

    async function readFileContent(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = () => reject(new Error('Failed to read ' + file.name));
        if (IMAGE_TYPES.includes(file.type) || IMAGE_EXT.test(file.name)) {
          r.readAsDataURL(file);
        } else if (file.type.startsWith('text/') || /\.(txt|md|json|csv|log)$/i.test(file.name)) {
          r.readAsText(file);
        } else {
          resolve('[File: ' + file.name + ']');
        }
      });
    }

    const URL_LINE_RE = /^https?:\/\/[^\s]+$/i;
    async function lineToCard(line) {
      const trimmed = line.trim();
      if (!trimmed) return null;
      if (URL_LINE_RE.test(trimmed)) {
        try {
          const r = await fetch(API + '/fetch-metadata?url=' + encodeURIComponent(trimmed));
          const data = r.ok ? await r.json() : {};
          const title = (data.title || '').trim();
          const description = (data.description || '').trim();
          const image = (data.image || '').trim();
          return {
            content: trimmed,
            imageUrl: image || undefined,
            meta: {
              ...(title && { ogTitle: title }),
              ...(description && { ogDescription: description })
            }
          };
        } catch (_) {
          return { content: trimmed };
        }
      }
      return { content: trimmed };
    }

    let activeTab = 'projects';
    let searchQuery = '';
    const SCORES_VIEW_KEY = 'uhmm-scores-view-mode';
    const PROJECTS_VIEW_KEY = 'uhmm-projects-view-mode';
    let scoresViewMode = localStorage.getItem(SCORES_VIEW_KEY) || 'list';
    if (scoresViewMode !== 'grid' && scoresViewMode !== 'list') scoresViewMode = 'list';
    let projectsViewMode = localStorage.getItem(PROJECTS_VIEW_KEY) || 'cards';
    if (projectsViewMode !== 'cards' && projectsViewMode !== 'list') projectsViewMode = 'cards';
    let projectTotalAggregateAnyway = false;
    const ACCORDION_LIMIT = 20;
    const LAZY_BATCH_SIZE = 20;
    const DEFAULT_STACK_LABEL = /^Stack #\d+$/;
    const DEFAULT_PROJECT_LABEL = /^Project #\d+$/;
    let _lastRoute = null;

    async function maybeDiscardEmpty(prev) {
      if (!prev || prev.tab !== 'projects' || prev.view === 'see-all') return;
      if (prev.stackId) {
        try {
          const [stack, cards] = await Promise.all([
            fetchJSON(API + '/stacks/' + prev.stackId),
            fetchJSON(API + '/stacks/' + prev.stackId + '/all-cards')
          ]);
          if (stack && cards && cards.length === 0 && DEFAULT_STACK_LABEL.test(stack.label || '')) {
            await fetch(API + '/stacks/' + prev.stackId, { method: 'DELETE' });
            render();
          }
        } catch (_) {}
      }
      if (prev.projectId && !prev.stackId && prev.projectId !== parseHash().projectId) {
        try {
          const stacks = await fetchJSON(API + '/projects/' + prev.projectId + '/stacks');
          const creatorId = getCreatorId();
          const proj = await fetchJSON(API + '/projects?creatorId=' + encodeURIComponent(creatorId || '') + '&projectId=' + encodeURIComponent(prev.projectId)).then(d => Array.isArray(d) ? d[0] : d?.projects?.[0]);
          if (!proj || !DEFAULT_PROJECT_LABEL.test(proj.label || '')) return;
          let allEmpty = true;
          for (const s of stacks || []) {
            const cards = await fetchJSON(API + '/stacks/' + s.id + '/all-cards').catch(() => []);
            if (cards.length > 0 || !DEFAULT_STACK_LABEL.test(s.label || '')) { allEmpty = false; break; }
          }
          if (allEmpty) {
            await fetch(API + '/projects/' + prev.projectId, { method: 'DELETE' });
            render();
          }
        } catch (_) {}
      }
    }

    function parseHash() {
      const h = (window.location.hash || '#/').slice(1);
      const [path, query] = h.split('?');
      const params = new URLSearchParams(query || '');
      const parts = path.split('/').filter(Boolean);
      const tab = parts[0] || 'projects';
      const view = parts[1] || 'main';
      let projectId = params.get('projectId') || null;
      let stackId = params.get('stackId') || null;
      // Projects path segments: #/projects/{projectId} or #/projects/{projectId}/{stackId}
      if (tab === 'projects' && parts[1] && parts[1] !== 'see-all') {
        projectId = parts[1];
        stackId = parts[2] || null;
      }
      return {
        tab,
        view,
        section: params.get('section') || null,
        projectId,
        stackId
      };
    }

    function navigateTo(hash) {
      window.location.hash = hash;
    }

    let _sortingProjects = false;
    let _sortableProjectsInstance = null;
    function setupSortableProjects(container, onReorder) {
      if (!container || !onReorder || typeof Sortable === 'undefined') return;
      if (_sortableProjectsInstance) {
        _sortableProjectsInstance.destroy();
        _sortableProjectsInstance = null;
      }
      _sortableProjectsInstance = Sortable.create(container, {
        animation: 150,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        dragClass: 'sortable-drag',
        draggable: '[data-project-id]',
        dataIdAttr: 'data-project-id',
        filter: '.no-drag',
        preventOnFilter: true,
        onEnd(evt) {
          const projectIds = evt.to.toArray();
          _sortingProjects = true;
          onReorder(projectIds);
          setTimeout(() => { _sortingProjects = false; }, 100);
        }
      });
    }

    function makeBreadcrumbs(items, includeTitle = true) {
      const wrap = el('div', { className: 'breadcrumbs-wrap' });
      const nav = el('div', { className: 'breadcrumbs' });
      let currentLabel = null;
      items.forEach((item) => {
        if (nav.childNodes.length > 0) nav.appendChild(el('span', { className: 'breadcrumb-sep' }, '›'));
        if (item.href) {
          const a = el('a', { href: '#' + item.href }, item.label);
          a.onclick = (e) => { e.preventDefault(); navigateTo('#' + item.href); };
          nav.appendChild(a);
        } else {
          currentLabel = item.label;
          nav.appendChild(el('span', { className: 'breadcrumb-current' }, item.label));
        }
      });
      wrap.appendChild(nav);
      if (includeTitle && currentLabel) {
        const title = el('h1', { className: 'breadcrumb-title' }, currentLabel);
        wrap.appendChild(title);
      }
      return wrap;
    }

    function updateHeaderBreadcrumbs(items) {
      const container = document.getElementById('header-breadcrumbs');
      if (!container) return;
      container.innerHTML = '';
      if (items.length === 0) return;
      const wrap = el('div', { className: 'breadcrumbs-wrap' });
      const singleItemOnly = items.length === 1 && !items[0].href;
      if (!singleItemOnly) {
        const nav = el('div', { className: 'breadcrumbs' });
        let currentLabel = null;
        items.forEach((item) => {
          if (nav.childNodes.length > 0) nav.appendChild(el('span', { className: 'breadcrumb-sep' }, '›'));
          if (item.href) {
            const a = el('a', { href: '#' + item.href }, item.label);
            a.onclick = (e) => { e.preventDefault(); navigateTo('#' + item.href); };
            nav.appendChild(a);
          } else {
            currentLabel = item.label;
            nav.appendChild(el('span', { className: 'breadcrumb-current' }, item.label));
          }
        });
        wrap.appendChild(nav);
      }
      const currentLabel = items[items.length - 1].label;
      const title = el('h1', { className: 'breadcrumb-title' }, currentLabel);
      wrap.appendChild(title);
      container.appendChild(wrap);

    async function renderSeeAllPage(root, route) {
      await fetchShareBaseUrl(render);
      const tabPath = '/projects';
      root.appendChild(makeAppHeaderForSeeAll(route, () => render()));
      const listContainer = el('div', { className: 'projects-section' });
      root.appendChild(listContainer);

      function setBreadcrumbs(items) {
        updateHeaderBreadcrumbs(items);
      }

      updateHeaderBreadcrumbs([{ label: 'Loading…' }]);

      const creatorId = getCreatorId();
      const reviewerName = getReviewerDisplayName();

      function projectsUrl(opts) {
        let url = API + '/projects?creatorId=' + encodeURIComponent(creatorId || '') +
          (reviewerName ? '&reviewerName=' + encodeURIComponent(reviewerName) : '');
        if (searchQuery) url += '&q=' + encodeURIComponent(searchQuery);
        if (opts?.limit) url += '&limit=' + opts.limit;
        if (opts?.offset) url += '&offset=' + opts.offset;
        if (opts?.section) url += '&section=' + encodeURIComponent(opts.section);
        if (opts?.projectId) url += '&projectId=' + encodeURIComponent(opts.projectId);
        return url;
      }

      const useServerPagination = (route.section === 'my' || route.section === 'other' || (!route.section && !route.projectId && !route.stackId));
      let paginationOffset = 0;
      let paginationTotal = 0;
      let loading = false;

      async function fetchProjectsPage(offset) {
        const res = await fetch(projectsUrl({ limit: LAZY_BATCH_SIZE, offset, section: route.section || 'my' }));
        const data = await res.json();
        if (data && typeof data === 'object' && 'projects' in data) return data;
        return { projects: data, total: data.length };
      }

      if (route.stackId) {
        try {
          const { stack, reviewers, directScores } = await fetchJSON(API + '/stacks/' + route.stackId + '/scores-by-reviewer').catch(() => ({}));
          const evaluators = [...(reviewers || []).map(r => ({ ...r, isDirect: false })), ...(directScores?.length ? [{ reviewerId: 'direct', reviewerName: 'Direct', sessionId: 'direct', scores: directScores, isDirect: true }] : [])];
          let breadcrumbItems = [{ label: 'Projects', href: tabPath }];
          if (stack) {
            if (stack.projectId) {
              try {
                const projData = await fetch(projectsUrl({ projectId: stack.projectId })).then(r => r.json());
                const proj = Array.isArray(projData) ? projData[0] : projData?.projects?.[0];
                if (proj) {
                  breadcrumbItems.push({ label: proj.label, href: tabPath + '/see-all?projectId=' + encodeURIComponent(stack.projectId) });
                }
              } catch (_) {}
            }
            breadcrumbItems.push({ label: stack.label, href: tabPath + '/see-all?stackId=' + encodeURIComponent(route.stackId) });
          }
          breadcrumbItems.push({ label: stack ? 'All reviewers — ' + stack.label : 'All reviewers' });
          setBreadcrumbs(breadcrumbItems);
          if (evaluators.length === 0) {
            listContainer.appendChild(el('p', { className: 'msg', style: 'color:#64748b' }, 'No reviewers.'));
            return;
          }
          evaluators.forEach(e => listContainer.appendChild(makeReviewerAccordion(e, route.stackId, stack?.projectId)));
        } catch {
          setBreadcrumbs([{ label: 'Projects', href: tabPath }, { label: 'All reviewers' }]);
          listContainer.appendChild(el('p', { className: 'error' }, 'Could not load.'));
        }
        return;
      }

      if (route.projectId) {
        try {
          const data = await fetch(projectsUrl({ projectId: route.projectId })).then(r => r.json());
          const proj = Array.isArray(data) ? data[0] : data?.projects?.[0];
          if (!proj) {
            setBreadcrumbs([{ label: 'Projects', href: tabPath }, { label: 'Project not found' }]);
            listContainer.appendChild(el('p', { className: 'msg', style: 'color:#64748b' }, 'Project not found.'));
            return;
          }
          setBreadcrumbs([{ label: 'Projects', href: tabPath }, { label: 'All stacks — ' + proj.label }]);
          let stacks = proj.stacks || [];
          if (stacks.length === 0) {
            listContainer.appendChild(el('p', { className: 'msg', style: 'color:#64748b' }, 'No stacks.'));
            return;
          }
          stacks.forEach(s => listContainer.appendChild(makeStackAccordion(proj.id, s)));
        } catch {
          setBreadcrumbs([{ label: 'Projects', href: tabPath }, { label: 'All stacks' }]);
          listContainer.appendChild(el('p', { className: 'error' }, 'Could not load.'));
        }
        return;
      }

      if (useServerPagination) {
        const sectionLabel = route.section === 'other' ? 'All other projects' : 'All my projects';
        setBreadcrumbs([{ label: 'Projects', href: tabPath }, { label: sectionLabel }]);
        try {
          const readOnly = route.section === 'other';
          const allItems = [];
          const scrollContainer = el('div', { className: 'see-all-list-container' });
          const innerContent = el('div', { className: 'see-all-list-inner' });
          scrollContainer.appendChild(innerContent);

          function appendItems(items) {
            items.forEach((item) => {
              const wrap = el('div', { className: 'see-all-list-item' });
              wrap.appendChild(readOnly ? makeScoresProjectBlock(item, true) : makeProjectBlock(item, false));
              innerContent.appendChild(wrap);
            });
          }

          async function loadNextBatch() {
            if (loading || paginationOffset >= paginationTotal) return;
            loading = true;
            const { projects, total } = await fetchProjectsPage(paginationOffset);
            paginationTotal = total;
            loading = false;
            projects.forEach(p => allItems.push(p));
            paginationOffset += projects.length;
            appendItems(projects);
          }

          const first = await fetchProjectsPage(0);
          paginationTotal = first.total;
          if (first.projects.length === 0) {
            listContainer.appendChild(el('p', { className: 'msg', style: 'color:#64748b' }, searchQuery ? 'No matches for "' + searchQuery + '".' : 'Nothing to show.'));
            return;
          }
          listContainer.appendChild(scrollContainer);
          first.projects.forEach(p => allItems.push(p));
          paginationOffset = first.projects.length;
          appendItems(first.projects);

          const sentinel = el('div', { style: 'height:1px;visibility:hidden' });
          innerContent.appendChild(sentinel);
          const observer = new IntersectionObserver((entries) => {
            if (entries[0]?.isIntersecting && paginationOffset < paginationTotal) loadNextBatch();
          }, { root: scrollContainer, rootMargin: '200px', threshold: 0 });
          observer.observe(sentinel);

          scrollContainer.onscroll = () => {
            if (paginationOffset < paginationTotal && scrollContainer.scrollTop + scrollContainer.clientHeight > innerContent.offsetHeight - 200) {
              loadNextBatch();
            }
          };
          if (paginationOffset < paginationTotal) loadNextBatch();
        } catch {
          listContainer.appendChild(el('p', { className: 'error' }, 'Could not load. Is the API running?'));
        }
        return;
      }

      setBreadcrumbs([{ label: route.tab === 'scores' ? 'Scores' : 'Projects', href: tabPath }, { label: 'See all' }]);
      listContainer.appendChild(el('p', { className: 'msg', style: 'color:#64748b' }, 'Nothing to show.'));
    }

    function makeProjectBlock(proj, limitStacks) {
      const projectBlock = el('div', { className: 'project project-accordion' });
      const projHeader = el('div', { className: 'accordion-header project-header' });
      const projHeaderLeft = el('div', { className: 'accordion-header-left' });
      const projChevron = el('span', { className: 'accordion-chevron' });
      const projLabelSpan = el('span', null, proj.label);
      const projEditIcon = el('span', { className: 'edit-icon', title: 'Edit name' }, '✏');
      projEditIcon.onclick = (e) => {
        e.stopPropagation();
        startEdit(projLabelSpan, proj.label, (newLabel) =>
          fetch(API + '/projects/' + proj.id, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ label: newLabel }) })
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(() => { render(); })
            .catch(() => alert('Could not update project name.'))
        );
      };
      projHeaderLeft.appendChild(projLabelSpan);
      projHeaderLeft.appendChild(projEditIcon);
      projHeader.appendChild(projHeaderLeft);
      const projActions = el('div', { className: 'header-actions' });
      const projGear = el('span', { className: 'gear-icon', title: 'Project settings' }, '⚙');
      projGear.onclick = async (e) => {
        e.stopPropagation();
        const current = proj.callbackUrl || '';
        makeWebhookSettingsModal('Project settings — Webhook URL (overrides account default)', current, async (val) => {
          await fetch(API + '/projects/' + proj.id, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ callbackUrl: val })
          }).then(r => r.ok ? null : Promise.reject()).catch(() => alert('Could not update project settings.'));
        }, () => render());
      };
      projActions.appendChild(projGear);
      projHeader.appendChild(projActions);
      projHeader.appendChild(projChevron);
      const projectContent = el('div', { className: 'project-content' });
      const stacks = (proj.stacks || []);
      let shownCount = limitStacks ? Math.min(ACCORDION_LIMIT, stacks.length) : stacks.length;
      const toShow = limitStacks ? stacks.slice(0, shownCount) : stacks;
      toShow.forEach((s) => projectContent.appendChild(makeStackAccordion(proj.id, s)));
      if (limitStacks && stacks.length > ACCORDION_LIMIT) {
        const loadMoreBtn = el('button', { className: 'load-more-btn' });
        const updateBtn = () => {
          const remaining = stacks.length - shownCount;
          if (remaining <= 0) { loadMoreBtn.remove(); return; }
          const toLoad = Math.min(ACCORDION_LIMIT, remaining);
          loadMoreBtn.textContent = 'Load ' + toLoad + ' more stack' + (toLoad === 1 ? '' : 's');
        };
        updateBtn();
        loadMoreBtn.onclick = (e) => {
          e.preventDefault();
          e.stopPropagation();
          const toLoad = Math.min(ACCORDION_LIMIT, stacks.length - shownCount);
          stacks.slice(shownCount, shownCount + toLoad).forEach((s) => projectContent.insertBefore(makeStackAccordion(proj.id, s), loadMoreBtn));
          shownCount += toLoad;
          updateBtn();
        };
        projectContent.appendChild(loadMoreBtn);
      }
      projectContent.appendChild(makeAddStackBtn(proj.id));
      const projBody = el('div', { className: 'accordion-body hidden' });
      projBody.appendChild(projectContent);
      projHeader.onclick = (e) => {
        if (e.target.closest('.header-actions')) return;
        projBody.classList.toggle('hidden');
        projChevron.classList.toggle('open');
      };
      projectBlock.appendChild(projHeader);
      projectBlock.appendChild(projBody);
      return projectBlock;
    }

    function makeScoresProjectBlock(proj, readOnly) {
      if (!proj.stacks || proj.stacks.length === 0) return el('div');
      const projectBlock = el('div', { className: 'project project-accordion' });
      const projHeader = el('div', { className: 'accordion-header project-header' });

      projCheckbox.setAttribute('data-project-id', proj.id);
      projCheckbox.onclick = (e) => e.stopPropagation();
      projCheckbox.onchange = () => {
        projCheckbox.indeterminate = false;
        const projectBlockEl = projCheckbox.closest('.project');
        if (projectBlockEl) projectBlockEl.querySelectorAll('.export-checkbox[data-stack-id]').forEach((cb) => { cb.checked = projCheckbox.checked; cb.indeterminate = false; });
      };
      projHeaderLeft.appendChild(projCheckbox);
      projHeaderLeft.appendChild(el('span', null, proj.label));
      projHeader.appendChild(projHeaderLeft);
      if (!readOnly) {
        const projActions = el('div', { className: 'header-actions' });
        const projGear = el('span', { className: 'gear-icon', title: 'Project settings' }, '⚙');
        projGear.onclick = async (e) => {
          e.stopPropagation();
          const current = proj.callbackUrl || '';
          makeWebhookSettingsModal('Project settings — Webhook URL (overrides account default)', current, async (val) => {
            await fetch(API + '/projects/' + proj.id, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ callbackUrl: val })
            }).then(r => r.ok ? null : Promise.reject()).catch(() => alert('Could not update project settings.'));
          }, () => render());
        };
        projActions.appendChild(projGear);
        projHeader.appendChild(projActions);
      }
      projHeader.appendChild(projChevron);
      const projectContent = el('div', { className: 'project-content' });

    function makeReviewerAccordion(r, stackId, projectId) {

      revHeader.appendChild(revChevron);
      const revBody = el('div', { className: 'accordion-body hidden' });
      const revSection = el('div', { className: 'reviewer-section' });
      const scoresUrl = !r.isDirect ? (projectId
        ? getShareBaseUrlSync() + '/scores/' + projectId + '/' + stackId + '/' + r.sessionId
        : getShareBaseUrlSync() + '/scores/' + stackId + '/' + r.sessionId) : null;
      const shareBtn = makeShareDropdown({ scores: r.scores || [], label: reviewerLabel, scoresUrl });
      if (shareBtn) {

        linkRow.appendChild(shareBtn);
        revSection.appendChild(linkRow);

      const scoresList = el('div', { className: 'reviewer-scores' });

            await fetch(API + '/projects/' + proj.id, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ callbackUrl: val })

        e.stopPropagation();
        const checkboxes = panel.querySelectorAll('.export-checkbox[data-stack-id]');

        checkboxes.forEach((cb) => {
          cb.checked = !allChecked;
          cb.indeterminate = false;
          cb.dispatchEvent(new Event('change', { bubbles: true }));
        });
      };
      const actionDropdown = el('select', { className: 'action-dropdown' });
      actionDropdown.innerHTML = '<option value="">Select action</option><option value="delete">Delete</option>';
      actionDropdown.onchange = async (e) => {
        const action = actionDropdown.value;
        actionDropdown.value = '';
        if (!action || action !== 'delete') return;
        const stackIds = [];
        panel.querySelectorAll('.export-checkbox[data-stack-id]:checked').forEach((cb) => {
          const sid = cb.getAttribute('data-stack-id');
          if (sid) stackIds.push(sid);
        });
        if (stackIds.length === 0) {
          alert('Select at least one stack.');
          return;
        }
        if (!confirm('Delete selected stacks? This cannot be undone.')) return;
        for (const sid of stackIds) {
          try {
            const r = await fetch(API + '/stacks/' + sid, { method: 'DELETE' });
            if (!r.ok) throw new Error('Delete failed');
          } catch { alert('Could not delete stack.'); }
        }
        render();
      };

      toolbar.appendChild(toggleAllBtn);

      panel.appendChild(toolbarSearchRow);

      stacksArea.dataset.projectId = proj.id;
      if (stacks.length === 0) {
        stacksArea.appendChild(el('p', { className: 'msg', style: 'color:#64748b' }, 'No stacks.'));
        content.appendChild(stacksArea);
      } else {
        function makeStackCard(s) {
          const card = el('div', { className: 'stack-card' });
          card.setAttribute('data-stack-id', s.id);
          if (!isOtherProject) {
            const cb = el('input', { type: 'checkbox', className: 'export-checkbox' });
            cb.setAttribute('data-stack-id', s.id);
            cb.onclick = (e) => e.stopPropagation();
            card.appendChild(cb);
          }
          const body = el('div', { className: 'card-body' });
          const label = el('div', { className: 'card-label' }, s.label);
          const meta = el('div', { className: 'card-meta' }, (s.cardCount != null ? s.cardCount : s.cards?.length || 0) + ' cards');
          body.appendChild(label);
          body.appendChild(meta);
          card.appendChild(body);
          card.onclick = (e) => {
            if (e.target.closest('.export-checkbox') || e.target.closest('.btn-action')) return;
            if (!isOtherProject && panel.classList.contains('select-mode')) {
              const cb = card.querySelector('.export-checkbox');
              if (cb) { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change', { bubbles: true })); }
            } else {
              navigateTo('#/projects/' + route.projectId + '/' + s.id);
            }
          };
          return card;
        }
        function makeStackListRow(s) {
          const row = el('div', { className: 'stack-list-item' });
          row.setAttribute('data-stack-id', s.id);
          const cardCount = s.cardCount != null ? s.cardCount : s.cards?.length || 0;
          const left = el('div', { className: 'list-item-left' });
          if (!isOtherProject) {
            const cb = el('input', { type: 'checkbox', className: 'export-checkbox' });
            cb.setAttribute('data-stack-id', s.id);
            cb.onclick = (e) => e.stopPropagation();
            left.appendChild(cb);
          }
          left.appendChild(el('span', { className: 'list-item-label' }, s.label));
          row.appendChild(left);
          const right = el('div', { className: 'list-item-right', style: 'display:flex;align-items:center;gap:8px;flex-wrap:wrap' });
          right.appendChild(el('span', { className: 'list-item-meta' }, cardCount + ' cards'));
          row.appendChild(right);
          row.onclick = (e) => {
            if (e.target.closest('.export-checkbox') || e.target.closest('.btn-action')) return;
            if (!isOtherProject && panel.classList.contains('select-mode')) {
              const cb = row.querySelector('.export-checkbox');
              if (cb) { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change', { bubbles: true })); }
            } else {
              navigateTo('#/projects/' + route.projectId + '/' + s.id);
            }
          };
          return row;
        }
        if (projectsViewMode === 'cards') {
          const grid = el('div', { className: 'projects-card-grid' });
          const loadMoreBtn = el('button', { className: 'load-more-btn' });
          let stacksShown = 0;
          const loadMore = () => {
            const batch = Math.min(ACCORDION_LIMIT, stacks.length - stacksShown);
            stacks.slice(stacksShown, stacksShown + batch).forEach((s) => grid.appendChild(makeStackCard(s)));
            stacksShown += batch;
            if (stacksShown >= stacks.length) loadMoreBtn.remove();
            else loadMoreBtn.textContent = 'Load ' + Math.min(ACCORDION_LIMIT, stacks.length - stacksShown) + ' more stack' + (stacks.length - stacksShown === 1 ? '' : 's');
          };
          loadMore();
          loadMoreBtn.onclick = (e) => { e.preventDefault(); loadMore(); };
          stacksArea.appendChild(grid);
          if (stacks.length > ACCORDION_LIMIT) stacksArea.appendChild(loadMoreBtn);
        } else if (projectsViewMode === 'list') {
          const list = el('div', { className: 'projects-list' });
          const loadMoreBtn = el('button', { className: 'load-more-btn' });
          let stacksShown = 0;
          const loadMore = () => {
            const batch = Math.min(ACCORDION_LIMIT, stacks.length - stacksShown);
            stacks.slice(stacksShown, stacksShown + batch).forEach((s) => list.appendChild(makeStackListRow(s)));
            stacksShown += batch;
            if (stacksShown >= stacks.length) loadMoreBtn.remove();
            else loadMoreBtn.textContent = 'Load ' + Math.min(ACCORDION_LIMIT, stacks.length - stacksShown) + ' more stack' + (stacks.length - stacksShown === 1 ? '' : 's');
          };
          loadMore();
          loadMoreBtn.onclick = (e) => { e.preventDefault(); loadMore(); };
          stacksArea.appendChild(list);
          if (stacks.length > ACCORDION_LIMIT) stacksArea.appendChild(loadMoreBtn);
        } else {
          const loadMoreBtn = el('button', { className: 'load-more-btn' });
          let stacksShown = 0;
          const loadMore = () => {
            const batch = Math.min(ACCORDION_LIMIT, stacks.length - stacksShown);
            stacks.slice(stacksShown, stacksShown + batch).forEach((s) => {
              if (loadMoreBtn.parentNode) stacksArea.insertBefore(makeStackAccordion(proj.id, s, { showCheckbox: true }), loadMoreBtn);
              else stacksArea.appendChild(makeStackAccordion(proj.id, s, { showCheckbox: true }));
            });
            stacksShown += batch;
            if (stacksShown >= stacks.length) loadMoreBtn.remove();
            else loadMoreBtn.textContent = 'Load ' + Math.min(ACCORDION_LIMIT, stacks.length - stacksShown) + ' more stack' + (stacks.length - stacksShown === 1 ? '' : 's');
          };
          if (stacks.length > ACCORDION_LIMIT) stacksArea.appendChild(loadMoreBtn);
          loadMore();
          loadMoreBtn.onclick = (e) => { e.preventDefault(); loadMore(); };
        }
        const scoresSection = el('div', { className: 'stack-scores-section', style: 'margin-top:24px;padding-top:24px' });
        const scoresTitle = el('div', { className: 'card-list-title', style: 'margin-bottom:12px' }, 'Reviewer scores');
        scoresSection.appendChild(scoresTitle);
        const totalContainer = el('div', { className: 'card-list' });
        loadProjectEvaluation(proj.id, stacks, totalContainer, isOtherProject, { minStacks: 1, viewModeKey: 'projects', showGroupByToggle: !isOtherProject });
        scoresSection.appendChild(totalContainer);
        content.appendChild(stacksArea);
        content.appendChild(scoresSection);
      }
      panel.appendChild(content);
    }

    function updateParentCheckbox(checkbox) {
      if (checkbox.hasAttribute('data-session-id')) {
        const stackBlock = checkbox.closest('.stack');
        if (!stackBlock) return;
        const stackCb = stackBlock.querySelector('.accordion-header .export-checkbox');
        if (!stackCb) return;
        const children = stackBlock.querySelectorAll('.export-checkbox[data-session-id]');
        const checked = [...children].filter((c) => c.checked).length;
        const total = children.length;
        stackCb.indeterminate = checked > 0 && checked < total;
        stackCb.checked = checked === total;
        updateParentCheckbox(stackCb);
      } else if (checkbox.hasAttribute('data-stack-id') && !checkbox.hasAttribute('data-project-id')) {
        const projectBlock = checkbox.closest('.project');
        if (!projectBlock) return;
        const projectCb = projectBlock.querySelector('.export-checkbox[data-project-id]');
        if (!projectCb) return;
        const children = projectBlock.querySelectorAll('.export-checkbox[data-stack-id]');
        const checked = [...children].filter((c) => c.checked).length;
        const total = children.length;
        projectCb.indeterminate = checked > 0 && checked < total;
        projectCb.checked = checked === total;
      }
    }

    function renderScoresPanel(panel, projects) {
      panel.innerHTML = '';
      const creatorId = getCreatorId();
      const myProjects = projects.filter(p => (p.creatorId ?? null) === creatorId);
      const otherProjects = projects.filter(p => (p.creatorId ?? null) !== creatorId);
      const hasAnyStack = myProjects.some(p => p.stacks && p.stacks.length > 0) || otherProjects.some(p => p.stacks && p.stacks.length > 0);

      if (searchQuery && !hasAnyStack) {
        panel.appendChild(el('p', { className: 'msg', style: 'color:#64748b' }, 'No matches for "' + searchQuery + '".'));
        return;
      }

      if (!hasAnyStack) {
        panel.appendChild(el('p', { className: 'msg', style: 'color:#64748b' }, 'No stacks yet. Create a project and stack in the Projects tab.'));
      }

      const toolbar = el('div', { className: 'scores-toolbar' });
      const selectBtn = el('button', { className: 'btn-action btn-select' }, 'Select');
      selectBtn.onclick = (e) => {
        e.stopPropagation();
        panel.classList.toggle('select-mode');
        selectBtn.classList.toggle('active', panel.classList.contains('select-mode'));
      };
      const toggleAllBtn = el('button', { className: 'btn-action btn-toggle-all' }, 'Toggle all');
      toggleAllBtn.onclick = (e) => {
        e.stopPropagation();
        const checkboxes = panel.querySelectorAll('.export-checkbox');
        const allChecked = checkboxes.length > 0 && [...checkboxes].every((cb) => cb.checked);
        checkboxes.forEach((cb) => {
          cb.checked = !allChecked;
          cb.indeterminate = false;
          cb.dispatchEvent(new Event('change', { bubbles: true }));
        });
      };
      const actionDropdown = el('select', { className: 'action-dropdown' });
      actionDropdown.innerHTML = '<option value="">Select action</option><option value="json-full">JSON (Full)</option><option value="json-aggregated">JSON (Aggregated)</option><option value="csv-full">CSV Full</option><option value="csv-aggregated">CSV Aggregated</option><option value="delete">Delete</option>';
      actionDropdown.onchange = async (e) => {
        const action = actionDropdown.value;
        actionDropdown.value = '';
        if (!action) return;
        const projectIds = [];
        const stackIds = [];
        const sessions = [];
        let firstProjectId = null;
        let firstStackId = null;
        panel.querySelectorAll('.export-checkbox:checked').forEach((cb) => {
          const pid = cb.getAttribute('data-project-id');
          const sid = cb.getAttribute('data-stack-id');
          const sessId = cb.getAttribute('data-session-id');
          if (pid) {
            projectIds.push(pid);
            if (!firstProjectId) firstProjectId = pid;
          } else if (sid && sessId) {
            sessions.push({ stackId: sid, sessionId: sessId });
            if (!firstStackId) firstStackId = sid;
            if (!firstProjectId) firstProjectId = cb.getAttribute('data-project-id');
          } else if (sid) {
            stackIds.push(sid);
            if (!firstStackId) firstStackId = sid;
            if (!firstProjectId) firstProjectId = cb.getAttribute('data-project-id');
          }
        });
        if (projectIds.length === 0 && stackIds.length === 0 && sessions.length === 0) {
          alert('Select at least one project, stack, or reviewer.');
          return;
        }
        if (action === 'delete' && !confirm('Delete selected scores? This cannot be undone.')) return;
        if (['json-full', 'json-aggregated', 'csv-full', 'csv-aggregated'].includes(action)) {
          const viewType = action.includes('aggregated') ? 'aggregated' : 'full';
          const ext = action.startsWith('json-') ? 'json' : 'csv';
          const dt = new Date().toISOString().slice(0, 19).replace('T', '_').replace(/:/g, '-');
          const filename = 'scores_' + viewType + '_' + dt + '.' + ext;
          fetch(API + '/scores/export', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ projectIds, stackIds, sessions, exportType: action })
          }).then(r => {
            if (!r.ok) throw new Error('Export failed');
            return r.text();
          }).then(text => {
            const isJson = action.startsWith('json-');
            const mime = isJson ? 'application/json' : 'text/csv';
            let displayText = text;
            if (isJson) {
              try { displayText = JSON.stringify(JSON.parse(text), null, 2); } catch (_) {}
            }
            const b64 = btoa(unescape(encodeURIComponent(displayText)));
            const html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Export</title><style>body{font-family:system-ui,sans-serif;margin:1rem;white-space:pre-wrap;word-break:break-all;}button{margin-bottom:1rem;padding:0.5rem 1rem;cursor:pointer;}</style></head><body><button onclick="d()">Download</button><pre id="c"></pre><script>(function(){var t=decodeURIComponent(escape(atob("' + b64 + '")));document.getElementById("c").textContent=t;window.d=function(){var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([t],{type:"' + mime + '"}));a.download="' + filename + '";a.click();};})();<' + '/script></body></html>';
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const w = window.open(url, '_blank');
            if (!w || w.closed) window.location.href = url;
            setTimeout(() => URL.revokeObjectURL(url), 10000);
          }).catch(() => alert('Could not export.'));
        } else if (action === 'delete') {
          for (const pid of projectIds) {
            try {
              await fetchJSON(API + '/projects/' + pid + '/clear', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
            } catch { alert('Could not clear project.'); }
          }
          for (const sid of stackIds) {
            try {
              await fetchJSON(API + '/stacks/' + sid + '/clear', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
            } catch { alert('Could not clear stack.'); }
          }
          for (const s of sessions) {
            try {
              await fetchJSON(API + '/stacks/' + s.stackId + '/sessions/' + s.sessionId + '/clear', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
              if (creatorId) {
                try {
                  await fetchJSON(API + '/scores/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ creatorId, stackId: s.stackId, sessionId: s.sessionId })
                  });
                } catch (_) { /* ignore if link not in added list */ }
              }
            } catch { alert('Could not delete.'); }
          }
          render();
        }
      };
      toolbar.appendChild(selectBtn);
      toolbar.appendChild(toggleAllBtn);
      toolbar.appendChild(actionDropdown);
      panel.appendChild(toolbar);

      function appendScoresProjectTo(container, proj) {
        if (!proj.stacks || proj.stacks.length === 0) return;
        const projectBlock = el('div', { className: 'project project-accordion' });
        const projHeader = el('div', { className: 'accordion-header project-header' });

        projGear.onclick = async (e) => {

          const current = proj.callbackUrl || '';
          makeWebhookSettingsModal('Project settings — Webhook URL (overrides account default)', current, async (val) => {
            await fetch(API + '/projects/' + proj.id, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ callbackUrl: val })
            }).then(r => r.ok ? null : Promise.reject()).catch(() => alert('Could not update project settings.'));
          }, () => render());
        };
        projActions.appendChild(projGear);
        projHeader.appendChild(projActions);
        projHeader.appendChild(projChevron);
        const projectContent = el('div', { className: 'project-content' });
        const projectEvalContainer = el('div', { className: 'project-eval-container' });
        projectContent.appendChild(projectEvalContainer);
        const stacks = proj.stacks || [];
        let stacksShown = 0;
        const stacksToShow = stacks.slice(0, ACCORDION_LIMIT);
        stacksToShow.forEach((s) => {
          projectContent.appendChild(makeScoresStackAccordion(proj.label, s));
          stacksShown++;
        });
        if (stacks.length > ACCORDION_LIMIT) {
          const loadMoreStacksBtn = el('button', { className: 'load-more-btn' });
          const updateStacksBtn = () => {
            const remaining = stacks.length - stacksShown;
            if (remaining <= 0) { loadMoreStacksBtn.remove(); return; }
            const toLoad = Math.min(ACCORDION_LIMIT, remaining);
            loadMoreStacksBtn.textContent = 'Load ' + toLoad + ' more stack' + (toLoad === 1 ? '' : 's');
          };
          updateStacksBtn();
          loadMoreStacksBtn.onclick = (e) => {
            e.preventDefault();
            e.stopPropagation();
            const toLoad = Math.min(ACCORDION_LIMIT, stacks.length - stacksShown);
            stacks.slice(stacksShown, stacksShown + toLoad).forEach((s) => {
              projectContent.insertBefore(makeScoresStackAccordion(proj.label, s), loadMoreStacksBtn);
              stacksShown++;
            });
            updateStacksBtn();
          };
          projectContent.appendChild(loadMoreStacksBtn);
        }
        const projBody = el('div', { className: 'accordion-body hidden' });
        projBody.appendChild(projectContent);
        projHeader.onclick = (e) => {
          if (e.target.closest('.header-actions')) return;
          projBody.classList.toggle('hidden');
          projChevron.classList.toggle('open');
        };
        projectBlock.appendChild(projHeader);
        projectBlock.appendChild(projBody);
        container.appendChild(projectBlock);
        loadProjectEvaluation(proj.id, proj.stacks, projectEvalContainer, false, { minStacks: 1, viewMode: scoresViewMode, showGroupByToggle: true });
      }

      const myProjectsWithStacks = myProjects.filter(p => {
        if (!p.stacks || p.stacks.length === 0) return false;
        if (creatorId) {
          const hasAnyScores = p.stacks.some(s => (s.scoreCount ?? 0) > 0);
          if (!hasAnyScores) return false;
        }
        return true;
      });
      const otherProjectsWithStacks = otherProjects.filter(p => p.stacks && p.stacks.length > 0);
      if (myProjectsWithStacks.length > 0) {
        const mySection = el('div', { className: 'projects-section' });
        mySection.appendChild(el('h3', { className: 'projects-section-title' }, 'My projects'));
        const myProjectsContainer = el('div');
        const loadMoreMyBtn = el('button', { className: 'load-more-btn' });
        let myShown = 0;
        const loadMoreMy = () => {
          const batch = Math.min(ACCORDION_LIMIT, myProjectsWithStacks.length - myShown);
          myProjectsWithStacks.slice(myShown, myShown + batch).forEach((proj) => appendScoresProjectTo(myProjectsContainer, proj));
          myShown += batch;
          if (myShown >= myProjectsWithStacks.length) loadMoreMyBtn.remove();
          else loadMoreMyBtn.textContent = 'Load ' + Math.min(ACCORDION_LIMIT, myProjectsWithStacks.length - myShown) + ' more project' + (myProjectsWithStacks.length - myShown === 1 ? '' : 's');
        };
        loadMoreMy();
        mySection.appendChild(myProjectsContainer);
        loadMoreMyBtn.onclick = (e) => { e.preventDefault(); loadMoreMy(); };
        if (myProjectsWithStacks.length > ACCORDION_LIMIT) {
          loadMoreMyBtn.textContent = 'Load ' + Math.min(ACCORDION_LIMIT, myProjectsWithStacks.length - myShown) + ' more project' + (myProjectsWithStacks.length - myShown === 1 ? '' : 's');
          mySection.appendChild(loadMoreMyBtn);
        }
        panel.appendChild(mySection);
      }
      if (otherProjectsWithStacks.length > 0) {
        const otherSection = el('div', { className: 'projects-section' });
        otherSection.appendChild(el('h3', { className: 'projects-section-title' }, 'Other projects'));
        const otherProjectsContainer = el('div');
        const loadMoreOtherBtn = el('button', { className: 'load-more-btn' });
        let otherShown = 0;
        const loadMoreOther = () => {
          const batch = Math.min(ACCORDION_LIMIT, otherProjectsWithStacks.length - otherShown);
          otherProjectsWithStacks.slice(otherShown, otherShown + batch).forEach((proj) => appendScoresProjectToReadOnly(otherProjectsContainer, proj));
          otherShown += batch;
          if (otherShown >= otherProjectsWithStacks.length) loadMoreOtherBtn.remove();
          else loadMoreOtherBtn.textContent = 'Load ' + Math.min(ACCORDION_LIMIT, otherProjectsWithStacks.length - otherShown) + ' more project' + (otherProjectsWithStacks.length - otherShown === 1 ? '' : 's');
        };
        loadMoreOther();
        otherSection.appendChild(otherProjectsContainer);
        loadMoreOtherBtn.onclick = (e) => { e.preventDefault(); loadMoreOther(); };
        if (otherProjectsWithStacks.length > ACCORDION_LIMIT) {
          loadMoreOtherBtn.textContent = 'Load ' + Math.min(ACCORDION_LIMIT, otherProjectsWithStacks.length - otherShown) + ' more project' + (otherProjectsWithStacks.length - otherShown === 1 ? '' : 's');
          otherSection.appendChild(loadMoreOtherBtn);
        }
        panel.appendChild(otherSection);
      }
    }

          btn.classList.toggle('active', scoresViewMode === btn.dataset.viewMode);

    async function refreshProjectsViews() {
      const panel = document.getElementById('panel-projects');
      if (!panel) return;
      const route = parseHash();

      if (route.projectId && route.stackId) {
        const container = panel.querySelector('[data-stack-cards-loaded]');
        if (!container) return;
        const stackId = container.dataset.stackId;
        container.innerHTML = '';
        container.removeAttribute('data-stack-cards-loaded');
        try {
          const stackCards = await fetchJSON(API + '/stacks/' + stackId + '/all-cards');
          if (stackCards.length === 0) {
            container.appendChild(el('p', { className: 'msg', style: 'color:#64748b' }, 'No cards.'));
          } else if (projectsViewMode === 'cards') {
            const title = el('div', { className: 'card-list-title' }, 'Cards in this stack (' + stackCards.length + ')');
            container.appendChild(title);
            const grid = el('div', { className: 'card-grid' });
            stackCards.forEach(c => {
              const item = el('div', { className: 'card-item' + (c.decision ? ' decision-' + c.decision : ''), title: c.content || '' });
              item.setAttribute('data-card-id', c.id);
              const cb = el('input', { type: 'checkbox', className: 'export-checkbox' });
              cb.setAttribute('data-card-id', c.id);
              cb.onclick = (e) => e.stopPropagation();
              item.appendChild(cb);
              if (c.imageUrl) {
                const img = el('img', { src: c.imageUrl, alt: c.content || '' });
                item.appendChild(img);
              }
              const label = (c.content || '').slice(0, 40) + (c.content?.length > 40 ? '…' : '');
              item.appendChild(document.createTextNode(label));
              item.onclick = (e) => {
                if (e.target.closest('.export-checkbox')) return;
                if (panel.classList.contains('select-mode')) {
                  cb.checked = !cb.checked;
                  cb.dispatchEvent(new Event('change', { bubbles: true }));
                }
              };
              grid.appendChild(item);
            });
            container.appendChild(grid);
          } else {
            const title = el('div', { className: 'card-list-title' }, 'Cards in this stack (' + stackCards.length + ')');
            container.appendChild(title);
            const listWrapper = el('div', { className: 'stack-card-list' });
            stackCards.forEach(c => {
              const row = el('div', { className: 'stack-card-list-row' });
              row.setAttribute('data-card-id', c.id);
              const cb = el('input', { type: 'checkbox', className: 'export-checkbox' });
              cb.setAttribute('data-card-id', c.id);
              cb.onclick = (e) => e.stopPropagation();
              row.appendChild(cb);
              if (c.imageUrl) {
                const img = el('img', { src: c.imageUrl, alt: c.content || '' });
                row.appendChild(img);
              }
              const text = el('div', { className: 'stack-card-list-text' }, (c.content || '').slice(0, 200) + (c.content?.length > 200 ? '…' : ''));
              row.appendChild(text);
              row.onclick = (e) => {
                if (e.target.closest('.export-checkbox')) return;
                if (panel.classList.contains('select-mode')) {
                  cb.checked = !cb.checked;
                  cb.dispatchEvent(new Event('change', { bubbles: true }));
                }
              };
              listWrapper.appendChild(row);
            });
            container.appendChild(listWrapper);
          }
          container.dataset.stackCardsLoaded = '1';
          container.dataset.stackId = stackId;
        } catch {
          container.appendChild(el('div', { className: 'card-item', style: 'color:#dc2626' }, 'Failed to load cards'));
        }
        const scoresContainer = panel.querySelector('[data-stack-scores-loaded]');
        if (scoresContainer) {
          if (scoresContainer._updateStackScoresView) scoresContainer._updateStackScoresView();
          else loadStackScoresForProjectDetail(stackId, scoresContainer, { readOnly: scoresContainer.dataset.readOnly === '1' });
        }
        return;
      }

      if (route.projectId) {
        const stacksArea = panel.querySelector('[data-project-stacks-loaded]');
        if (!stacksArea) return;
        const projectId = stacksArea.dataset.projectId;
        try {
          const creatorId = getCreatorId();
          const reviewerName = getReviewerDisplayName();
          const url = API + '/projects?creatorId=' + encodeURIComponent(creatorId || '') +
            (reviewerName ? '&reviewerName=' + encodeURIComponent(reviewerName) : '') +
            '&projectId=' + encodeURIComponent(projectId);
          const data = await fetch(url).then(r => r.json());
          const proj = Array.isArray(data) ? data[0] : data?.projects?.[0];
          let stacks = proj?.stacks || [];
          if (stacks.length === 0 && (proj?.stackCount != null && proj.stackCount > 0)) {
            stacks = await fetchJSON(API + '/projects/' + projectId + '/stacks').catch(() => []) || [];
          }
          stacksArea.innerHTML = '';
          if (stacks.length === 0) {
            stacksArea.appendChild(el('p', { className: 'msg', style: 'color:#64748b' }, 'No stacks.'));
          } else {
            const panelRef = panel;
            function makeStackCard(s) {
              const card = el('div', { className: 'stack-card' });
              card.setAttribute('data-stack-id', s.id);
              const cb = el('input', { type: 'checkbox', className: 'export-checkbox' });
              cb.setAttribute('data-stack-id', s.id);
              cb.onclick = (e) => e.stopPropagation();
              const body = el('div', { className: 'card-body' });
              const label = el('div', { className: 'card-label' }, s.label);
              const meta = el('div', { className: 'card-meta' }, (s.cardCount != null ? s.cardCount : s.cards?.length || 0) + ' cards');
              body.appendChild(label);
              body.appendChild(meta);
              card.appendChild(cb);
              card.appendChild(body);
              card.onclick = (e) => {
                if (e.target.closest('.export-checkbox')) return;
                if (panelRef.classList.contains('select-mode')) {
                  cb.checked = !cb.checked;
                  cb.dispatchEvent(new Event('change', { bubbles: true }));
                } else {
                  navigateTo('#/projects/' + projectId + '/' + s.id);
                }
              };
              return card;
            }
            function makeStackListRow(s) {
              const row = el('div', { className: 'stack-list-item' });
              row.setAttribute('data-stack-id', s.id);
              const cb = el('input', { type: 'checkbox', className: 'export-checkbox' });
              cb.setAttribute('data-stack-id', s.id);
              cb.onclick = (e) => e.stopPropagation();
              const cardCount = s.cardCount != null ? s.cardCount : s.cards?.length || 0;
              const left = el('div', { className: 'list-item-left' });
              left.appendChild(cb);
              left.appendChild(el('span', { className: 'list-item-label' }, s.label));
              row.appendChild(left);
              row.appendChild(el('span', { className: 'list-item-meta' }, cardCount + ' cards'));
              row.onclick = (e) => {
                if (e.target.closest('.export-checkbox')) return;
                if (panelRef.classList.contains('select-mode')) {
                  cb.checked = !cb.checked;
                  cb.dispatchEvent(new Event('change', { bubbles: true }));
                } else {
                  navigateTo('#/projects/' + projectId + '/' + s.id);
                }
              };
              return row;
            }
            if (projectsViewMode === 'cards') {
              const grid = el('div', { className: 'projects-card-grid' });
              stacks.forEach((s) => grid.appendChild(makeStackCard(s)));
              stacksArea.appendChild(grid);
            } else {
              const list = el('div', { className: 'projects-list' });
              stacks.forEach((s) => list.appendChild(makeStackListRow(s)));
              stacksArea.appendChild(list);
            }
          }
          stacksArea.dataset.projectStacksLoaded = '1';
          stacksArea.dataset.projectId = projectId;
        } catch {
          stacksArea.appendChild(el('p', { className: 'error' }, 'Could not load stacks.'));
        }
        panel.querySelectorAll('[data-project-eval-loaded]').forEach((c) => c._updateProjectEval?.());
        return;
      }

      const projectsSection = panel.querySelector('[data-projects-list-loaded]');
      if (!projectsSection) return;
      const creatorId = getCreatorId();
      try {
        const projectsUrl = API + '/projects?creatorId=' + encodeURIComponent(creatorId || '') +
          (getReviewerDisplayName() ? '&reviewerName=' + encodeURIComponent(getReviewerDisplayName()) : '') +
          (searchQuery ? '&q=' + encodeURIComponent(searchQuery) : '');
        const projects = await fetch(projectsUrl).then(r => r.json());
        const myProjects = (Array.isArray(projects) ? projects : (projects?.projects || projects || [])).filter(p => (p.creatorId ?? null) === creatorId);
        projectsSection.innerHTML = '';
        projectsSection.appendChild(el('h3', { className: 'projects-section-title' }, 'My projects'));
        function makeProjectCard(p) {
          const card = el('div', { className: 'project-card' });
          card.setAttribute('data-project-id', p.id);
          const cb = el('input', { type: 'checkbox', className: 'export-checkbox' });
          cb.setAttribute('data-project-id', p.id);
          cb.onclick = (e) => e.stopPropagation();
          const body = el('div', { className: 'card-body' });
          const label = el('div', { className: 'card-label' }, p.label);
          const count = p.stackCount != null ? p.stackCount : (p.stacks?.length || 0);
          const meta = el('div', { className: 'card-meta' }, count + ' stack' + (count !== 1 ? 's' : ''));
          body.appendChild(label);
          body.appendChild(meta);
          card.appendChild(cb);
          card.appendChild(body);
          card.onclick = (e) => {
            if (e.target.closest('.export-checkbox')) return;
            if (panel.classList.contains('select-mode')) {
              cb.checked = !cb.checked;
              cb.dispatchEvent(new Event('change', { bubbles: true }));
            } else if (!_sortingProjects) {
              navigateTo('#/projects/' + p.id);
            }
          };
          return card;
        }
        function makeProjectListRow(p) {
          const row = el('div', { className: 'project-list-item' });
          row.setAttribute('data-project-id', p.id);
          const cb = el('input', { type: 'checkbox', className: 'export-checkbox' });
          cb.setAttribute('data-project-id', p.id);
          cb.onclick = (e) => e.stopPropagation();
          const count = p.stackCount != null ? p.stackCount : (p.stacks?.length || 0);
          const left = el('div', { className: 'list-item-left' });
          left.appendChild(cb);
          left.appendChild(el('span', { className: 'list-item-label' }, p.label));
          row.appendChild(left);
          row.appendChild(el('span', { className: 'list-item-meta' }, count + ' stack' + (count !== 1 ? 's' : '')));

            if (e.target.closest('.export-checkbox')) return;
            if (panel.classList.contains('select-mode')) {
              cb.checked = !cb.checked;
              cb.dispatchEvent(new Event('change', { bubbles: true }));

          setupSortableProjects(list, (projectIds) => {
            fetch(API + '/projects/reorder?creatorId=' + encodeURIComponent(creatorId || ''), {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ projectIds })
            }).then((r) => { if (!r.ok) render(); });
          });
        }

        projectsSection.appendChild(el('p', { className: 'error' }, 'Could not load.'));
