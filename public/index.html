    function makeScoresStackAccordion(projectLabel, stack, readOnly) {
      const block = el('div', { className: 'stack' });
      const header = el('div', { className: 'accordion-header' });
      const headerLeft = el('div', { className: 'accordion-header-left' });
      const chevron = el('span', { className: 'accordion-chevron' });
      const stackCheckbox = el('input', { type: 'checkbox', className: 'export-checkbox' });
      stackCheckbox.setAttribute('data-stack-id', stack.id);
      if (stack.projectId) stackCheckbox.setAttribute('data-project-id', stack.projectId);
      stackCheckbox.onclick = (e) => e.stopPropagation();
      stackCheckbox.onchange = () => {
        stackCheckbox.indeterminate = false;
        const stackBlock = stackCheckbox.closest('.stack');
        if (stackBlock) stackBlock.querySelectorAll('.export-checkbox[data-session-id]').forEach((cb) => { cb.checked = stackCheckbox.checked; });
        updateParentCheckbox(stackCheckbox);
      };
      headerLeft.appendChild(stackCheckbox);
      const initialLabel = stack.label + (stack.cardCount != null ? ' (' + stack.cardCount + ' cards)' : '');
      headerLeft.appendChild(el('span', { className: 'stack-label' }, initialLabel));
      header.appendChild(headerLeft);
      if (readOnly && stack.projectId) {
        const actions = el('div', { className: 'header-actions' });
        const reviewUrl = getShareBaseUrlSync() + '/review/' + stack.projectId + '/' + stack.id;
        const scoresUrl = stack.hasScoresFromMe && stack.mySessionId
          ? getShareBaseUrlSync() + '/scores/' + stack.projectId + '/' + stack.id + '/' + stack.mySessionId
          : null;
        const btn = el('a', {
          className: 'btn-action',
          href: scoresUrl || reviewUrl,
          target: '_blank',
          rel: 'noopener'
        }, stack.hasScoresFromMe ? 'View scores' : 'Start review');
        btn.onclick = (e) => e.stopPropagation();
        actions.appendChild(btn);
        header.appendChild(actions);
      }
      header.appendChild(chevron);

      const scoresContainer = el('div', { className: 'card-list' });
      const body = el('div', { className: 'accordion-body hidden' });
      body.appendChild(makeStackViewToggle());
      body.appendChild(scoresContainer);

      block.appendChild(header);
      block.appendChild(body);
      header.onclick = (e) => {
        if (e.target.closest('.header-actions')) return;
        body.classList.toggle('hidden');
        const isOpen = !body.classList.contains('hidden');
        chevron.classList.toggle('open');
        if (isOpen) loadStackScores(stack.id, scoresContainer, { readOnly, stack });
      };
      return block;
    }

    function formatDecidedAt(decidedAt) {
      if (!decidedAt) return '';
      try {
        const d = new Date(decidedAt);
        return isNaN(d.getTime()) ? '' : d.toLocaleString();
      } catch { return ''; }
    }
    function renderScoresList(scores, parent) {
      scores.forEach((c) => {
        const row = el('div', { className: 'score-row' });
        const decisionEl = el('div', { className: 'score-decision ' + (c.decision || '') }, c.decision || '');
        const contentEl = el('div', { className: 'score-content' });
        if (c.imageUrl) {
          const img = el('img', { src: c.imageUrl, alt: c.content || '' });
          row.appendChild(img);
        }
        const contentStr = (c.content || '').slice(0, 200) + (c.content?.length > 200 ? '…' : '');
        contentEl.appendChild(document.createTextNode(contentStr));
        if (c.decidedAt) {
          const timeEl = el('div', { className: 'score-decided-at', style: 'font-size:0.8rem;color:#64748b;margin-top:4px' }, formatDecidedAt(c.decidedAt));
          contentEl.appendChild(timeEl);
        }
        row.appendChild(decisionEl);
        row.appendChild(contentEl);
        parent.appendChild(row);
      });
    }

    function renderScoresAsCards(scores, parent, opts) {
      const aggregated = opts?.aggregated ?? false;
      const initialShow = opts?.initialShow;
      const sorted = aggregated
        ? [...scores]
        : [...scores].sort((a, b) => (a.decision === 'approved' ? 0 : 1) - (b.decision === 'approved' ? 0 : 1));
      const grid = el('div', { className: 'card-grid' });
      sorted.forEach((c, idx) => {
        const item = el('div', {
          className: 'card-item' + (aggregated
            ? (c.approved >= c.rejected ? ' decision-approved' : ' decision-rejected')
            : ' decision-' + (c.decision || '')
          )
        });
        if (initialShow != null && aggregated && idx >= initialShow) item.style.display = 'none';
        if (c.imageUrl) {
          const img = el('img', { src: c.imageUrl, alt: c.content || '' });
          item.appendChild(img);
        }
        const badgeEl = el('span', { className: 'score-decision', style: 'display:block;margin-bottom:4px;font-size:0.75rem' });
        if (aggregated) {
          badgeEl.appendChild(el('span', { className: 'count-approved' }, String(c.approved)));
          badgeEl.appendChild(document.createTextNode(' - '));
          badgeEl.appendChild(el('span', { className: 'count-rejected' }, String(c.rejected)));
        } else {
          const icon = c.decision === 'approved'
            ? el('span', { className: 'count-approved' }, '✓')
            : c.decision === 'rejected'
              ? el('span', { className: 'count-rejected' }, '✗')
              : document.createTextNode(c.decision || '');
          badgeEl.appendChild(icon);
        }
        const label = (c.content || '').slice(0, 40) + (c.content?.length > 40 ? '…' : '');
        item.appendChild(badgeEl);
        item.appendChild(document.createTextNode(label));
        if (!aggregated && c.decidedAt) {
          const timeEl = el('div', { className: 'score-decided-at', style: 'font-size:0.7rem;color:#64748b;margin-top:6px;display:block' }, formatDecidedAt(c.decidedAt));
          item.appendChild(timeEl);
        }
        grid.appendChild(item);
      });
      parent.appendChild(grid);
      if (initialShow != null && aggregated && sorted.length > initialShow) {
        const showMoreBtn = el('button', { className: 'btn-action', style: 'margin-top:12px;margin-right:8px' }, 'See more');
        const showLessBtn = el('button', { className: 'btn-action', style: 'margin-top:12px;display:none' }, 'See less');
        showMoreBtn.onclick = () => {
          grid.querySelectorAll('.card-item').forEach((item, i) => { if (i >= initialShow) item.style.display = ''; });
          showMoreBtn.style.display = 'none';
          showLessBtn.style.display = '';
        };
        showLessBtn.onclick = () => {
          grid.querySelectorAll('.card-item').forEach((item, i) => { if (i >= initialShow) item.style.display = 'none'; });
          showLessBtn.style.display = 'none';
          showMoreBtn.style.display = '';
        };
        parent.appendChild(showMoreBtn);
        parent.appendChild(showLessBtn);
      }
    }

    function renderScores(scores, parent, opts) {
      parent.innerHTML = '';
      const mode = opts?.viewMode ?? scoresViewMode;
      if (mode === 'grid') {
        renderScoresAsCards(scores, parent, opts);
      } else {
        renderScoresList(scores, parent);
      }
    }

    function countDecisions(scores) {
      const counts = { approved: 0, rejected: 0 };
      (scores || []).forEach((s) => {
        if (s.decision && counts[s.decision] !== undefined) counts[s.decision]++;
      });
      return counts;
    }

    function formatReviewerLabel(r) {
      if (!r) return 'Unknown';
      const name = r.reviewerName || 'Unknown';
      const id = r.reviewerId || null;
      return id ? (name + ' (' + id + ')') : name;
    }

    function sortByApprovalRejected(a, b) {
      if (a.rejected !== b.rejected) return a.rejected - b.rejected;  // fewer rejections first
      if (b.approved !== a.approved) return b.approved - a.approved;  // then more approvals first
      return (a.content || '').localeCompare(b.content || '') || (a.cardId || '').localeCompare(b.cardId || '');
    }

    function renderEvaluationSummary(counts, container) {
      const total = counts.approved + counts.rejected;
      const summary = el('div', { className: 'evaluation-summary' });
      summary.innerHTML = '<strong>Totals:</strong> ' + total + ' cards — ' +
        '<span class="count-approved">' + counts.approved + ' approved</span> · ' +
        '<span class="count-rejected">' + counts.rejected + ' rejected</span>';
      container.appendChild(summary);
    }

    async function loadProjectEvaluation(projectId, stacks, container, reviewerOnly, opts) {
      if (!stacks || stacks.length < (opts?.minStacks ?? 2)) return;
      const projectCounts = { approved: 0, rejected: 0 };
      const myReviewerName = reviewerOnly ? getReviewerDisplayName() : null;
      const allScores = [];
      const reviewersByIdentity = new Map();
      const directScoresAll = [];
      try {
        await Promise.all(stacks.map(async (s) => {
          let { reviewers, directScores } = await fetchJSON(API + '/stacks/' + s.id + '/scores-by-reviewer');
          if (reviewerOnly && myReviewerName) {
            reviewers = (reviewers || []).filter((r) => r.reviewerName === myReviewerName);
            directScores = [];
          }
          (reviewers || []).forEach((r) => {
            const c = countDecisions(r.scores);
            projectCounts.approved += c.approved;
            projectCounts.rejected += c.rejected;
            (r.scores || []).forEach((sc) => {
              const scoreWithStack = { ...sc, stackId: s.id, stackLabel: s.label || '' };
              allScores.push(scoreWithStack);
              const reviewerKey = r.reviewerId || r.reviewerName;
              if (!reviewersByIdentity.has(reviewerKey)) {
                reviewersByIdentity.set(reviewerKey, {
                  reviewerId: r.reviewerId || null,
                  reviewerName: r.reviewerName || '',
                  label: formatReviewerLabel(r),
                  scores: [],
                  sessionId: r.sessionId,
                  stackId: s.id
                });
              }
              reviewersByIdentity.get(reviewerKey).scores.push(scoreWithStack);
            });
          });
          const dc = countDecisions(directScores);
          projectCounts.approved += dc.approved;
          projectCounts.rejected += dc.rejected;
          (directScores || []).forEach((sc) => {
            const scoreWithStack = { ...sc, stackId: s.id, stackLabel: s.label || '' };
            allScores.push(scoreWithStack);
            directScoresAll.push(scoreWithStack);
          });
        }));
        const total = projectCounts.approved + projectCounts.rejected;
        if (total === 0) return;
        const cardAgg = new Map();
        allScores.forEach((s) => {
          if (!s.cardId) return;
          const key = s.stackId + ':' + s.cardId;
          let agg = cardAgg.get(key);
          if (!agg) {
            agg = { cardId: s.cardId, content: s.content || '', imageUrl: s.imageUrl, stackLabel: s.stackLabel || '', approved: 0, rejected: 0 };
            cardAgg.set(key, agg);
          }
          if (s.decision === 'approved') agg.approved++;
          else if (s.decision === 'rejected') agg.rejected++;
          if (!agg.imageUrl && s.imageUrl) agg.imageUrl = s.imageUrl;
        });
        const cardsByApproval = [...cardAgg.values()].sort(sortByApprovalRejected);
        if (stacks.length > 1) {
          cardsByApproval.forEach((agg) => { agg.content = (agg.stackLabel ? '[' + agg.stackLabel + '] ' : '') + (agg.content || ''); });
        }

        const reviewCounts = new Set([...cardAgg.values()].map((c) => c.approved + c.rejected));
        const allCardsReviewedEqually = reviewCounts.size === 1;
        const aggregateAnyway = opts?.showGroupByToggle && !allCardsReviewedEqually ? projectTotalAggregateAnyway : false;
        const showGrouped = allCardsReviewedEqually || !aggregateAnyway;
        const groupsByReviewCount = showGrouped
          ? (() => {
              const m = new Map();
              cardsByApproval.forEach((c) => {
                const n = c.approved + c.rejected;
                if (!m.has(n)) m.set(n, []);
                m.get(n).push(c);
              });
              return [...m.entries()].sort((a, b) => b[0] - a[0]).map(([n, cards]) => ({ reviewCount: n, cards: cards.sort(sortByApprovalRejected) }));
            })()
          : null;

        const numEvaluators = reviewersByIdentity.size + (directScoresAll.length > 0 ? 1 : 0);
        const showTotalsAccordion = numEvaluators >= 2 && stacks.length >= 2;

        const getViewMode = () => opts?.viewModeKey === 'projects' ? (projectsViewMode === 'cards' ? 'grid' : 'list') : (opts?.viewMode ?? scoresViewMode);

        function renderCardList(cards, parent) {
          if (getViewMode() === 'grid') {
            renderScoresAsCards(cards, parent, { aggregated: true, initialShow: 20 });
          } else {
            const INITIAL_SHOW = 20;
            const showMoreBtn = el('button', { className: 'btn-action', style: 'margin-top:12px;margin-right:8px' }, 'See more');
            const showLessBtn = el('button', { className: 'btn-action', style: 'margin-top:12px;display:none' }, 'See less');
            const totalList = el('div', { className: 'reviewer-scores' });
            cards.forEach((agg, idx) => {
              const row = el('div', { className: 'score-row' });
              if (agg.imageUrl) {
                const img = el('img', { src: agg.imageUrl, alt: agg.content || '' });
                row.appendChild(img);
              }
              const badge = el('span', { className: 'score-decision', style: 'margin-right:8px' });
              badge.appendChild(el('span', { className: 'count-approved' }, String(agg.approved)));
              badge.appendChild(document.createTextNode(' - '));
              badge.appendChild(el('span', { className: 'count-rejected' }, String(agg.rejected)));
              const contentStr = (agg.content || '').slice(0, 200) + (agg.content?.length > 200 ? '…' : '');
              const contentEl = el('span', { className: 'score-content' }, contentStr);
              row.appendChild(badge);
              row.appendChild(contentEl);
              if (idx >= INITIAL_SHOW) row.style.display = 'none';
              totalList.appendChild(row);
            });
            parent.appendChild(totalList);
            if (cards.length > INITIAL_SHOW) {
              showMoreBtn.onclick = () => {
                totalList.querySelectorAll('.score-row').forEach((r, i) => { if (i >= INITIAL_SHOW) r.style.display = ''; });
                showMoreBtn.style.display = 'none';
                showLessBtn.style.display = '';
              };
              showLessBtn.onclick = () => {
                totalList.querySelectorAll('.score-row').forEach((r, i) => { if (i >= INITIAL_SHOW) r.style.display = 'none'; });
                showLessBtn.style.display = 'none';
                showMoreBtn.style.display = '';
              };
              parent.appendChild(showMoreBtn);
              parent.appendChild(showLessBtn);
            }
          }
        }

        let updateTotalsContentFn = null;
        if (showTotalsAccordion) {
          const totalAccordion = el('div', { className: 'reviewer-accordion totals-accordion' });
          const totalHeader = el('div', { className: 'accordion-header', style: 'padding:10px 12px;cursor:pointer' });
          const totalHeaderLeft = el('div', { className: 'accordion-header-left' });
          const totalChevron = el('span', { className: 'accordion-chevron' });
          totalHeaderLeft.appendChild(document.createTextNode('Totals'));
          totalHeader.appendChild(totalHeaderLeft);
          totalHeader.appendChild(totalChevron);
          const totalBody = el('div', { className: 'accordion-body hidden' });
          const totalSection = el('div', { className: 'reviewer-section' });
          const totalsScoresUrl = getShareBaseUrlSync() + '/scores/' + projectId;
          const linkRow = el('div', { className: 'scores-link-row' });
          const totalsShareBtn = makeShareDropdown({ cardsByApproval, label: 'Totals', scoresUrl: totalsScoresUrl });
          if (totalsShareBtn) linkRow.appendChild(totalsShareBtn);
          totalBody.appendChild(linkRow);
          renderEvaluationSummary(projectCounts, totalBody);
          let aggCheck = null;
          if (opts?.showGroupByToggle && !allCardsReviewedEqually) {
            const groupToolbar = el('div', { className: 'stack-scores-toolbar', style: 'margin-bottom:12px;display:flex;justify-content:flex-start' });
            const aggLabel = el('label', { style: 'display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:0.9rem' });
            aggCheck = document.createElement('input');
            aggCheck.type = 'checkbox';
            aggCheck.checked = aggregateAnyway;
            aggLabel.appendChild(aggCheck);
            aggLabel.appendChild(document.createTextNode('aggregate (heads up: not all cards have been reviewed by all the reviewers)'));
            groupToolbar.appendChild(aggLabel);
            totalSection.appendChild(groupToolbar);
          }

          function updateTotalsContent() {
            projectTotalAggregateAnyway = aggCheck?.checked ?? projectTotalAggregateAnyway;
            const aggregateAnywayNow = opts?.showGroupByToggle && !allCardsReviewedEqually ? projectTotalAggregateAnyway : false;
            const showGroupedNow = allCardsReviewedEqually || !aggregateAnywayNow;
            const groupsNow = showGroupedNow
              ? (() => {
                  const m = new Map();
                  cardsByApproval.forEach((c) => {
                    const n = c.approved + c.rejected;
                    if (!m.has(n)) m.set(n, []);
                    m.get(n).push(c);
                  });
                  return [...m.entries()].sort((a, b) => b[0] - a[0]).map(([n, cards]) => ({ reviewCount: n, cards: cards.sort(sortByApprovalRejected) }));
                })()
              : null;
            const keepCount = opts?.showGroupByToggle && !allCardsReviewedEqually ? 1 : 0;
            while (totalSection.children.length > keepCount) totalSection.lastChild.remove();
            if (groupsNow) {
              groupsNow.forEach((g) => {
                const groupLabel = g.reviewCount + ' reviewer' + (g.reviewCount === 1 ? '' : 's');
                const groupTitle = el('div', { className: 'card-list-title', style: 'margin-top:16px;margin-bottom:8px' }, groupLabel);
                totalSection.appendChild(groupTitle);
                const groupList = el('div', { className: 'reviewer-scores' });
                renderCardList(g.cards, groupList);
                totalSection.appendChild(groupList);
              });
            } else {
              const totalList = el('div', { className: 'reviewer-scores' });
              renderCardList(cardsByApproval, totalList);
              totalSection.appendChild(totalList);
            }
          }

          updateTotalsContentFn = updateTotalsContent;
          aggCheck && (aggCheck.onchange = () => updateTotalsContent());

          if (groupsByReviewCount) {
            groupsByReviewCount.forEach((g) => {
              const groupLabel = g.reviewCount + ' reviewer' + (g.reviewCount === 1 ? '' : 's');
              const groupTitle = el('div', { className: 'card-list-title', style: 'margin-top:16px;margin-bottom:8px' }, groupLabel);
              totalSection.appendChild(groupTitle);
              const groupList = el('div', { className: 'reviewer-scores' });
              renderCardList(g.cards, groupList);
              totalSection.appendChild(groupList);
            });
          } else {
            const totalList = el('div', { className: 'reviewer-scores' });
            renderCardList(cardsByApproval, totalList);
            totalSection.appendChild(totalList);
          }
          totalBody.appendChild(totalSection);
          totalHeader.onclick = () => {
            totalBody.classList.toggle('hidden');
            totalChevron.classList.toggle('open');
          };
          totalAccordion.appendChild(totalHeader);
          totalAccordion.appendChild(totalBody);
          container.appendChild(totalAccordion);
        }

        function updateProjectEval() {
          updateTotalsContentFn && updateTotalsContentFn();
          container.querySelectorAll('.reviewer-accordion:not(.totals-accordion)').forEach((acc) => acc._updateScoresView?.());
        }
        if (opts?.viewModeKey === 'projects') {
          container.dataset.projectEvalLoaded = '1';
          container._updateProjectEval = updateProjectEval;
        }

        const scoresOpts = { get viewMode() { return getViewMode(); } };
        const multiStack = stacks.length > 1;

        function addReviewerAccordion(reviewerLabel, scores, beforeEl, sessionId, stackId) {
          const uniqueStacksInScores = new Set(scores.map((s) => s.stackId || s.stackLabel || '').filter(Boolean));
          const multiStackForReviewer = uniqueStacksInScores.size > 1;
          const accordion = el('div', { className: 'reviewer-accordion' });
          const revHeader = el('div', { className: 'accordion-header', style: 'padding:10px 12px;cursor:pointer' });
          const revHeaderLeft = el('div', { className: 'accordion-header-left' });
          const revChevron = el('span', { className: 'accordion-chevron' });
          revHeaderLeft.appendChild(document.createTextNode(reviewerLabel));
          revHeader.appendChild(revHeaderLeft);
          revHeader.appendChild(revChevron);
          const revBody = el('div', { className: 'accordion-body hidden' });
          const revSection = el('div', { className: 'reviewer-section' });
          const scoresUrl = (sessionId && stackId) ? (projectId
            ? getShareBaseUrlSync() + '/scores/' + projectId + '/' + stackId + '/' + sessionId
            : getShareBaseUrlSync() + '/scores/' + stackId + '/' + sessionId) : null;
          const shareBtn = makeShareDropdown({ scores, label: reviewerLabel, scoresUrl });
          if (shareBtn) {
            const linkRow = el('div', { className: 'scores-link-row' });
            linkRow.appendChild(shareBtn);
            revSection.appendChild(linkRow);
          }
          const revCounts = countDecisions(scores);
          const revSummary = el('div', { className: 'evaluation-summary' });
          revSummary.innerHTML = '<strong>' + reviewerLabel + ':</strong> ' + (revCounts.approved + revCounts.rejected) + ' cards — ' +
            '<span class="count-approved">' + revCounts.approved + ' approved</span> · ' +
            '<span class="count-rejected">' + revCounts.rejected + ' rejected</span>';
          revSection.appendChild(revSummary);
          const scoresContainer = el('div', { className: 'reviewer-scores' });
          function getStackDisplayLabel(sc) {
            const stack = stacks.find((s) => s.id === sc.stackId);
            return stack ? (stack.label || stack.id) : (sc.stackLabel || sc.stackId || 'Stack');
          }
          function renderScoresContent() {
            scoresContainer.innerHTML = '';
            if (multiStackForReviewer) {
              const byStack = new Map();
              scores.forEach((sc) => {
                const key = sc.stackId || sc.stackLabel || '';
                if (!byStack.has(key)) byStack.set(key, []);
                byStack.get(key).push(sc);
              });
              const stackOrder = [...stacks].map((s) => s.id).filter(Boolean);
              const ordered = [...byStack.entries()].sort((a, b) => {
                const ia = stackOrder.indexOf(a[0]);
                const ib = stackOrder.indexOf(b[0]);
                if (ia >= 0 && ib >= 0) return ia - ib;
                if (ia >= 0) return -1;
                if (ib >= 0) return 1;
                return (a[0] || '').localeCompare(b[0] || '');
              });
              ordered.forEach(([stackKey, stackScores]) => {
                const first = stackScores[0];
                const displayLabel = first ? getStackDisplayLabel(first) : (stackKey || 'Stack');
                const groupTitle = el('div', { className: 'card-list-title', style: 'margin-top:16px;margin-bottom:8px' }, displayLabel);
                if (scoresContainer.children.length === 0) groupTitle.style.marginTop = '0';
                scoresContainer.appendChild(groupTitle);
                const groupList = el('div', { className: 'reviewer-scores' });
                renderScores(stackScores, groupList, scoresOpts);
                scoresContainer.appendChild(groupList);
              });
            } else {
              renderScores(scores, scoresContainer, scoresOpts);
            }
          }
          renderScoresContent();
          revSection.appendChild(scoresContainer);
          revBody.appendChild(revSection);
          revHeader.onclick = () => {
            revBody.classList.toggle('hidden');
            revChevron.classList.toggle('open');
          };
          accordion._updateScoresView = () => renderScoresContent();
          accordion.appendChild(revHeader);
          accordion.appendChild(revBody);
          if (beforeEl) container.insertBefore(accordion, beforeEl);
          else container.appendChild(accordion);
        }

        const sortedReviewers = [...reviewersByIdentity.values()].sort((a, b) => (a.label || '').localeCompare(b.label || ''));
        const hasDirect = directScoresAll.length > 0;
        const totalReviewers = sortedReviewers.length + (hasDirect ? 1 : 0);
        const reviewersToShow = sortedReviewers.slice(0, hasDirect ? ACCORDION_LIMIT - 1 : ACCORDION_LIMIT);
        const loadMoreBtn = totalReviewers > ACCORDION_LIMIT ? el('button', { className: 'load-more-btn' }) : null;
        if (loadMoreBtn) container.appendChild(loadMoreBtn);
        const beforeEl = loadMoreBtn || null;
        reviewersToShow.forEach((data) => addReviewerAccordion(data.label, data.scores, beforeEl, data.sessionId, data.stackId));
        if (hasDirect && sortedReviewers.length < ACCORDION_LIMIT) {
          addReviewerAccordion('Direct', directScoresAll, beforeEl, null, null);
        }
        if (loadMoreBtn) {
          let reviewersShown = reviewersToShow.length + (hasDirect && sortedReviewers.length < ACCORDION_LIMIT ? 1 : 0);
          const updateBtn = () => {
            const remaining = totalReviewers - reviewersShown;
            if (remaining <= 0) { loadMoreBtn.remove(); return; }
            loadMoreBtn.textContent = 'Load ' + Math.min(ACCORDION_LIMIT, remaining) + ' more reviewer' + (remaining === 1 ? '' : 's');
          };
          updateBtn();
          loadMoreBtn.onclick = (e) => {
            e.preventDefault();
            const toLoad = Math.min(ACCORDION_LIMIT, totalReviewers - reviewersShown);
            for (let i = 0; i < toLoad && reviewersShown < totalReviewers; i++) {
              if (reviewersShown < sortedReviewers.length) {
                const data = sortedReviewers[reviewersShown];
                addReviewerAccordion(data.label, data.scores, loadMoreBtn, data.sessionId, data.stackId);
                reviewersShown++;
              } else if (hasDirect && reviewersShown === sortedReviewers.length) {
                addReviewerAccordion('Direct', directScoresAll, loadMoreBtn, null, null);
                reviewersShown++;
              }
            }
            updateBtn();
          };
          container.appendChild(loadMoreBtn);
        }
      } catch {
        container.appendChild(el('div', { className: 'evaluation-summary', style: 'color:#dc2626' }, 'Could not load project evaluation'));
      }
    }

    function refreshScoresViews() {
      document.querySelectorAll('[data-scores-loaded]').forEach((container) => {
        const stackId = container.dataset.stackId;
        const readOnly = container.dataset.readOnly === '1';
        loadStackScores(stackId, container, { readOnly });
      });
    }

    async function loadStackScores(stackId, container, opts) {
      const readOnly = opts?.readOnly ?? false;
      container.innerHTML = '';
      try {
        let { stack, reviewers, directScores } = await fetchJSON(API + '/stacks/' + stackId + '/scores-by-reviewer');
        if (readOnly) {
          const myReviewerName = getReviewerDisplayName();
          reviewers = (reviewers || []).filter((r) => r.reviewerName === myReviewerName);
          directScores = [];
        }
        const hasReviewers = reviewers && reviewers.length > 0;
        const hasDirect = directScores && directScores.length > 0;
        if (!hasReviewers && !hasDirect) {
          container.appendChild(el('p', { className: 'score-content' }, 'No scores yet. Share the review link and have reviewers swipe cards.'));
          return;
        }
        const stackCounts = { approved: 0, rejected: 0 };
        (reviewers || []).forEach((r) => {
          const c = countDecisions(r.scores);
          stackCounts.approved += c.approved;
          stackCounts.rejected += c.rejected;
        });
        const directCounts = countDecisions(directScores);
        stackCounts.approved += directCounts.approved;
        stackCounts.rejected += directCounts.rejected;

        const allScoresForCount = [...(reviewers || []).flatMap((r) => r.scores || []), ...(directScores || [])];
        const totalCards = new Set(allScoresForCount.map((s) => s.cardId).filter(Boolean)).size;
        const stackBlock = container.closest('.stack');
        if (stackBlock && stack) {
          const labelSpan = stackBlock.querySelector('.stack-label');
          if (labelSpan) labelSpan.textContent = stack.label + (totalCards > 0 ? ' (' + totalCards + ' cards)' : '');
        }

    function startEdit(spanEl, currentLabel, onSave) {
      const parent = spanEl.parentElement;
      const input = document.createElement('input');
      input.type = 'text';
      input.value = currentLabel;
      input.style.cssText = 'border:1px solid #2563eb;border-radius:4px;padding:2px 6px;font:inherit;min-width:120px;';
      const finish = (save) => {
        const val = input.value.trim();
        input.remove();
        parent.appendChild(spanEl);
        if (save && val && val !== currentLabel) onSave(val);
        else spanEl.textContent = currentLabel;
      };
      const commit = () => { finish(true); };
      input.onblur = () => commit();
      input.onkeydown = (e) => {
        if (e.key === 'Enter') { e.preventDefault(); commit(); }
        else if (e.key === 'Escape') { e.preventDefault(); finish(false); }
      };
      parent.replaceChild(input, spanEl);
      input.focus();
      input.select();
    }

    function makeAddCardsSection(stack, onSuccess) {
      const section = el('div', { className: 'add-cards-section', style: 'margin-top:20px;padding-top:20px' });
      const fileInput = el('input', { type: 'file', multiple: true, style: 'display:none' });
      const fileList = el('div', { className: 'file-list' });
      let pendingFiles = [];

      function existingKeys() {
        return new Set(pendingFiles.map((f) => f.name + '|' + f.size + '|' + (f.lastModified || 0)));
      }
      function setFiles(files, append) {
        if (!append) pendingFiles = [];
        const seen = append ? existingKeys() : new Set();
        for (let i = 0; i < (files || []).length; i++) {
          const f = files[i];
          const key = f.name + '|' + f.size + '|' + (f.lastModified || 0);
          if (seen.has(key)) continue;
          seen.add(key);
          pendingFiles.push(f);
        }
        fileList.innerHTML = '';
        pendingFiles.forEach(f => fileList.appendChild(el('span', null, f.name)));
      }

      const uploadZone = el('div', {
        className: 'upload-zone',
        ondragover: (e) => { e.preventDefault(); e.currentTarget.classList.add('dragover'); },
        ondragleave: (e) => { e.currentTarget.classList.remove('dragover'); },
        ondrop: (e) => {
          e.preventDefault();
          e.stopPropagation();
          e.currentTarget.classList.remove('dragover');
          setFiles(e.dataTransfer.files, true);
        },
        onclick: () => fileInput.click()
      });
      uploadZone.appendChild(el('div', null, '📁 Drag & drop files or click to browse'));
      uploadZone.appendChild(fileInput);
      uploadZone.appendChild(fileList);

      let changeDebounce = 0;
      fileInput.onchange = (e) => {
        const files = e.target.files;
        if (!files || files.length === 0) return;
        clearTimeout(changeDebounce);
        changeDebounce = setTimeout(() => {
          setFiles(files, true);
          e.target.value = '';
        }, 10);
      };

      const textarea = el('textarea', { placeholder: 'Or paste cards or URLs (one per line)' });
      const msg = el('div', { className: 'msg' });
      const sendBtn = el('button', { className: 'btn-send' }, 'Add cards');

      sendBtn.onclick = async () => {
        if (sendBtn.disabled) return;
        sendBtn.disabled = true;

        const filesToProcess = pendingFiles.slice();
        pendingFiles = [];
        fileList.innerHTML = '';
        fileInput.value = '';

        msg.textContent = '';
        msg.className = 'msg';
        const lines = textarea.value.split('\n').map(s => s.trim()).filter(Boolean);
        let cards = [];
        for (const line of lines) {
          const card = await lineToCard(line);
          if (card) cards.push(card);
        }

        const fileSeen = new Set();
        for (const file of filesToProcess) {
          const key = file.name + '|' + file.size + '|' + (file.lastModified || 0);
          if (fileSeen.has(key)) continue;
          fileSeen.add(key);
          try {
            const result = await readFileContent(file);
            const isImage = IMAGE_TYPES.includes(file.type) || IMAGE_EXT.test(file.name);
            if (isImage && typeof result === 'string' && result.startsWith('data:')) {
              cards.push({ content: file.name, imageUrl: result });
            } else {
              cards.push({ content: typeof result === 'string' ? result : '[File: ' + file.name + ']' });
            }
          } catch (e) {
            msg.textContent = e.message || 'Failed to read file';
            msg.className = 'msg error';
            sendBtn.disabled = false;
            return;
          }
        }

        if (cards.length === 0) {
          msg.textContent = 'Add files or paste at least one card';
          msg.className = 'msg error';
          sendBtn.disabled = false;
          return;
        }

        const cardSeen = new Set();
        cards = cards.filter(c => {
          const key = (c.content || '') + '|' + (c.imageUrl ? c.imageUrl.length + c.imageUrl.slice(-500) : '');
          if (cardSeen.has(key)) return false;
          cardSeen.add(key);
          return true;
        });
        if (cards.length === 0) {
          sendBtn.disabled = false;
          return;
        }

        try {
          await fetchJSON(API + '/stacks/' + stack.id + '/cards', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cards })
          });
          textarea.value = '';
          if (onSuccess) onSuccess();
        } catch (e) {
          msg.textContent = e.message || 'Failed to add cards';
          msg.className = 'msg error';
        } finally {
          sendBtn.disabled = false;
        }
      };

      section.appendChild(uploadZone);
      section.appendChild(textarea);
      section.appendChild(sendBtn);
      section.appendChild(msg);
      return section;
    }

        for (const file of filesToProcess) {
          const key = file.name + '|' + file.size + '|' + (file.lastModified || 0);
          if (fileSeen.has(key)) continue;
          fileSeen.add(key);
          try {
            const result = await readFileContent(file);
            const isImage = IMAGE_TYPES.includes(file.type) || IMAGE_EXT.test(file.name);
            if (isImage && typeof result === 'string' && result.startsWith('data:')) {
              cards.push({ content: file.name, imageUrl: result });
            } else {
              cards.push({ content: typeof result === 'string' ? result : '[File: ' + file.name + ']' });
            }
          } catch (e) {
            msg.textContent = e.message || 'Failed to read file';
            msg.className = 'msg error';
            return;
          }
        }

        if (cards.length === 0) {
          msg.textContent = 'Add files or paste at least one card';
          msg.className = 'msg error';
          return;
        }

        const cardSeen = new Set();
        cards = cards.filter(c => {
          const key = (c.content || '') + '|' + (c.imageUrl ? c.imageUrl.length + c.imageUrl.slice(-500) : '');
          if (cardSeen.has(key)) return false;
          cardSeen.add(key);
          return true;
        });
        if (cards.length === 0) {
          sendBtn.disabled = false;
          return;
        }

        try {
          await fetchJSON(API + '/stacks/' + stack.id + '/cards', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cards })
          });
          textarea.value = '';
          pendingFiles = [];
          fileList.innerHTML = '';
          loadStackCards(stack.id, cardListContainer);
          body.classList.remove('hidden');
          chevron.classList.add('open');
        } catch (e) {
          msg.textContent = e.message || 'Failed to add cards';
          msg.className = 'msg error';
        } finally {
          sendBtn.disabled = false;
        }
      };

      content.appendChild(uploadZone);
      content.appendChild(textarea);
      content.appendChild(sendBtn);
      content.appendChild(msg);
      content.appendChild(cardListContainer);
      body.appendChild(content);
      block.appendChild(header);
      block.appendChild(body);
      loadStackCards(stack.id, cardListContainer);
      header.onclick = (e) => {
        if (e.target.closest('.header-actions')) return;
        if (showCheckbox) {
          const panel = block.closest('#panel-projects');
          if (panel && panel.classList.contains('select-mode')) {
            const cb = headerLeft.querySelector('.export-checkbox[data-stack-id]');
            if (cb) {
              cb.checked = !cb.checked;
              cb.dispatchEvent(new Event('change', { bubbles: true }));
            }
            return;
          }
        }
        body.classList.toggle('hidden');
        const isOpen = !body.classList.contains('hidden');
        chevron.classList.toggle('open');
        if (isOpen && cardListContainer.children.length === 0) loadStackCards(stack.id, cardListContainer);
      };
      return block;
    }

    window.addEventListener('hashchange', render);
    refreshAuthUser().finally(() => {
      if (localStorage.getItem(AUTH_KEY) === null && !authUser) localStorage.setItem(AUTH_KEY, '0');
      render();
    });
  </script>
</body>
</html>
